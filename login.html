<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | CEC English Camp</title>
<meta name="description" content="CEC English Camp 로그인">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Outfit','Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;text-decoration:none}
.brand img{width:42px;height:42px;border-radius:8px;object-fit:contain}
.brand span{font-size:1.15rem;font-weight:800;color:#fff}
.card{width:100%;max-width:440px;background:#0a0a0a;border:1px solid rgba(0,255,255,.13);border-radius:18px;padding:36px 32px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.title{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:2rem;color:#fff;text-align:center;letter-spacing:-.01em;margin-bottom:6px}
.sub{text-align:center;color:#00f2ff;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:1.05rem;margin-bottom:24px}
.btn-google{width:100%;padding:14px;background:#fff;color:#1f1f1f;border:none;border-radius:50px;font-size:.97rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .2s,transform .15s,box-shadow .2s;box-shadow:0 2px 10px rgba(255,255,255,.08)}
.btn-google:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,255,255,.15)}
.btn-google:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:rgba(255,255,255,.35);font-size:.78rem;letter-spacing:1px;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;font-weight:700;color:rgba(255,255,255,.65);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px}
.field input{width:100%;padding:13px 16px;background:#000;border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-size:.95rem;font-family:inherit;transition:border-color .2s,background .2s}
.field input:focus{outline:none;border-color:#00bcd4;background:#050505}
.btn{width:100%;padding:15px;background:#00bcd4;color:#000;border:none;border-radius:50px;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:opacity .2s,transform .15s;margin-top:6px}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.alt{text-align:center;font-size:.85rem;color:rgba(255,255,255,.55);margin-top:18px}
.alt a{color:#00bcd4;text-decoration:none;font-weight:700}
.alt a:hover{color:#4dd0e1}
.forgot{text-align:right;margin-top:-4px;margin-bottom:14px}
.forgot a{font-size:.8rem;color:rgba(255,255,255,.5);text-decoration:none}
.forgot a:hover{color:#00bcd4}
.msg{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:.85rem;line-height:1.55;display:none}
.msg.error{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);color:#ff7d96;display:block}
.msg.ok{background:rgba(0,242,255,.08);border:1px solid rgba(0,242,255,.3);color:#00f2ff;display:block}
</style>
</head>
<body>

<a href="/" class="brand">
  <img src="/assets/robo.png" alt="Robo" onerror="this.style.display='none'">
  <span>CEC English Camp</span>
</a>

<div class="card">
  <h1 class="title">로그인</h1>
  <p class="sub">Welcome Back</p>

  <button type="button" class="btn-google" id="googleBtn">
    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
      <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
      <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
      <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571.001-.001.002-.001.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
    </svg>
    Google로 로그인
  </button>

  <div class="divider">또는 이메일로 로그인</div>

  <form id="loginForm" autocomplete="on">
    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="password">비밀번호</label>
      <input type="password" id="password" required autocomplete="current-password" placeholder="••••••">
    </div>
    <div class="forgot"><a href="/forgot-password.html">비밀번호를 잊으셨나요?</a></div>
    <button type="submit" class="btn" id="submitBtn">로그인</button>
  </form>

  <div id="msg" class="msg"></div>

  <p class="alt">아직 계정이 없으신가요? <a href="/signup.html">회원가입 →</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://rzlqlokqplhyntuirsmd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_A4HJDb41-YeAMIaRnB8KeQ_ssECgA6q';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const form = document.getElementById('loginForm');
const msg = document.getElementById('msg');
const btn = document.getElementById('submitBtn');
const gBtn = document.getElementById('googleBtn');

function showMsg(t, type){ msg.textContent = t; msg.className = 'msg ' + type; }

function ko(err){
  const m = (err && err.message ? err.message : String(err)).toLowerCase();
  if (m.includes('invalid login credentials') || m.includes('invalid_credentials')) return '이메일 또는 비밀번호가 틀렸어요';
  if (m.includes('email not confirmed')) return '이메일 인증을 완료해주세요';
  if (m.includes('user not found') || m.includes('not found')) return '가입되지 않은 이메일이에요';
  if (m.includes('too many requests') || m.includes('rate limit')) return '잠시 후 다시 시도해주세요';
  return '오류: ' + (err.message || err);
}

// next= 파라미터 (require-auth가 보내는 원래 경로)
function nextDest() {
  var p = new URLSearchParams(location.search).get('next');
  if (p && p[0] === '/') return p;
  return '/';
}

// 이미 로그인 상태면 next 또는 메인으로
sb.auth.getSession().then(({ data }) => {
  if (data?.session) {
    showMsg('이미 로그인되어 있습니다. 이동합니다…', 'ok');
    setTimeout(() => location.href = nextDest(), 800);
  }
});

gBtn.addEventListener('click', async () => {
  gBtn.disabled = true;
  msg.className = 'msg';
  try {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: 'https://cecenglishcamp.com/' }
    });
    if (error) throw error;
  } catch (err) {
    showMsg('❌ Google 로그인 오류: ' + (err.message || err), 'error');
    gBtn.disabled = false;
  }
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  btn.disabled = true; btn.textContent = '로그인 중…';
  msg.className = 'msg';
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
    showMsg('✓ 로그인 성공! 이동합니다…', 'ok');
    setTimeout(() => location.href = nextDest(), 600);
  } catch (err) {
    showMsg('❌ ' + ko(err), 'error');
    btn.disabled = false;
    btn.textContent = '로그인';
  }
});
</script>
</body>
</html>
