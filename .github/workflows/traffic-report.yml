name: CEC Daily Traffic Report

# Timezone: America/Los_Angeles
# PDT (UTC-7): 12:00 PM PT = 19:00 UTC  |  6:00 PM PT = 01:00 UTC next day
# PST (UTC-8): 12:00 PM PT = 20:00 UTC  |  6:00 PM PT = 02:00 UTC next day
# We target the PDT schedule (summer); add 1h in winter if needed.

on:
  schedule:
    - cron: '0 19 * * *'   # 12:00 PM PDT (19:00 UTC)
    - cron: '0 1  * * *'   # 6:00 PM PDT  (01:00 UTC next day)
  workflow_dispatch:
    inputs:
      report_time:
        description: 'Report time label (e.g. "12:00 PM" or "6:00 PM")'
        required: false
        default: '12:00 PM'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Determine report time
        id: label
        run: |
          HOUR=$(TZ="America/Los_Angeles" date +%H)
          if [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 18 ]; then
            echo "report_time=12:00 PM" >> "$GITHUB_OUTPUT"
          else
            echo "report_time=6:00 PM"  >> "$GITHUB_OUTPUT"
          fi

      - name: Call generate-traffic-report Edge Function
        env:
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
          REPORT_SECRET: ${{ secrets.REPORT_SECRET }}
          REPORT_TIME: ${{ github.event.inputs.report_time || steps.label.outputs.report_time }}
        run: |
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "$SUPABASE_FUNCTION_URL/generate-traffic-report" \
            -H "Authorization: Bearer $REPORT_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"report_time\": \"$REPORT_TIME\"}")

          echo "HTTP status: $RESPONSE"
          cat response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "::error::Edge Function returned HTTP $RESPONSE"
            exit 1
          fi
