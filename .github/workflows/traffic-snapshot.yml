name: CEC Traffic Snapshot (2h)

# GitHub Actions cron is UTC.
# Snapshot runs every 2 hours. Report labels are displayed in America/Los_Angeles time.
# Edge Function queries visit_events for the most recent 2-hour window.

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  generate-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Call generate-traffic-snapshot Edge Function
        env:
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
          SNAPSHOT_SECRET: ${{ secrets.REPORT_SECRET }}
        run: |
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "$SUPABASE_FUNCTION_URL/generate-traffic-snapshot" \
            -H "Authorization: Bearer $SNAPSHOT_SECRET" \
            -H "Content-Type: application/json")

          echo "HTTP status: $RESPONSE"
          cat response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "::error::Edge Function returned HTTP $RESPONSE"
            exit 1
          fi
