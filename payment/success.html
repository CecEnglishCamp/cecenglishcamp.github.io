<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 완료 — CEC English Camp</title>
<meta name="robots" content="noindex,follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Noto+Sans+KR:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1628;color:#f5f0e8;font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.card{max-width:560px;margin:auto;padding:50px 40px;background:rgba(255,255,255,.03);border:1.5px solid rgba(0,242,255,.25);border-radius:20px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.ic{width:80px;height:80px;margin:0 auto 22px;border-radius:50%;background:rgba(122,216,122,.15);border:2px solid #7ad87a;display:flex;align-items:center;justify-content:center;font-size:2.4rem}
h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;font-style:italic;color:#fff;margin-bottom:10px}
h1 em{color:#00f2ff;font-style:italic}
.kr{font-family:'Noto Sans KR',sans-serif;font-size:.95rem;color:rgba(245,240,232,.75);line-height:1.85;margin-bottom:24px}
.session-id{font-family:'JetBrains Mono','Consolas',monospace;font-size:.7rem;color:rgba(245,240,232,.4);background:rgba(255,255,255,.04);padding:8px 12px;border-radius:6px;word-break:break-all;margin-bottom:30px}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-block;padding:13px 28px;border-radius:10px;text-decoration:none;font-family:'Outfit',sans-serif;font-size:.92rem;font-weight:700;transition:all .2s;letter-spacing:.02em}
.btn-primary{background:#00f2ff;color:#0a1628;box-shadow:0 4px 14px rgba(0,242,255,.25)}
.btn-primary:hover{background:#33f5ff;transform:translateY(-1px)}
.btn-secondary{background:transparent;color:#f5f0e8;border:1px solid rgba(255,255,255,.25)}
.btn-secondary:hover{background:rgba(255,255,255,.06);border-color:#00f2ff}
.footnote{margin-top:28px;font-family:'Noto Sans KR',sans-serif;font-size:.78rem;color:rgba(245,240,232,.45);line-height:1.7}
.footnote a{color:#00bcd4;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="ic">🎉</div>
  <h1>결제 <em>완료</em>되었습니다!</h1>
  <p class="kr">
    구독 신청해주셔서 감사합니다.<br>
    영수증과 학습 시작 안내를 등록하신 이메일로 보내드립니다.<br>
    <strong style="color:#00f2ff">잠시 후 이메일을 확인해주세요.</strong>
  </p>
  <div class="session-id" id="sessionId">Session: —</div>
  <div class="btn-row">
    <a href="/" class="btn btn-primary">홈으로 →</a>
    <a href="/camp-c/" class="btn btn-secondary">학습 시작</a>
  </div>
  <div class="footnote">
    문의: <a href="mailto:CecEnglishCamp@gmail.com">CecEnglishCamp@gmail.com</a><br>
    구독 관리는 결제 영수증 이메일의 "Manage subscription" 링크로 가능합니다.
  </div>
</div>
<script>
var sid = new URLSearchParams(location.search).get('session_id');
if (sid) document.getElementById('sessionId').textContent = 'Session: ' + sid.slice(0, 32) + '…';
else     document.getElementById('sessionId').style.display = 'none';
</script>
</body>
</html>
