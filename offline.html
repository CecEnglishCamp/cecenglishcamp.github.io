<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>오프라인 — CEC English Camp</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a1628;
  color: #f5f0e8;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  top: -200px; right: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(0,242,255,0.06) 0%, transparent 70%);
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  bottom: -150px; left: -150px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(201,168,76,0.05) 0%, transparent 70%);
  pointer-events: none;
}

.container {
  position: relative;
  text-align: center;
  max-width: 420px;
  z-index: 1;
}

.icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 0.5px solid #00f2ff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin: 0 auto 2rem;
  animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0,242,255,0.3); }
  50% { box-shadow: 0 0 0 18px rgba(0,242,255,0); }
}

.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  font-style: italic;
  color: #00f2ff;
  letter-spacing: 0.04em;
  margin-bottom: 0.6rem;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 5vw, 36px);
  font-weight: 500;
  font-style: italic;
  color: #f5f0e8;
  margin-bottom: 1rem;
  line-height: 1.2;
}

p {
  font-size: 14px;
  color: #8a9bb0;
  line-height: 1.8;
  margin-bottom: 2.5rem;
}

.btn {
  display: inline-block;
  background: #00f2ff;
  color: #0a1628;
  padding: 13px 36px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 500;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  letter-spacing: 0.02em;
  transition: all 0.2s;
  border: none;
  cursor: pointer;
}

.btn:hover {
  background: #00d4e0;
  transform: translateY(-1px);
}

.btn-secondary {
  background: transparent;
  color: #00f2ff;
  border: 0.5px solid #00f2ff;
  margin-left: 8px;
}
.btn-secondary:hover { background: rgba(0,242,255,0.08); transform: translateY(-1px); }

.hint {
  font-size: 11px;
  color: rgba(138,155,176,0.6);
  margin-top: 2rem;
  line-height: 1.7;
}
</style>
</head>
<body>

<div class="container">
  <div class="icon">📡</div>
  <div class="brand">CEC English Camp</div>
  <h1>오프라인 상태</h1>
  <p>인터넷 연결을 확인해주세요.<br>연결이 복구되면 정상적으로 이용하실 수 있습니다.</p>
  <a href="/" class="btn">홈으로 가기</a>
  <button class="btn btn-secondary" onclick="location.reload()">다시 시도</button>
  <div class="hint">이전에 방문한 페이지 일부는 오프라인에서도 열람 가능합니다.</div>
</div>

</body>
</html>
