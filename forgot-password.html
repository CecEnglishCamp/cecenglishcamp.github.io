<div class="card">
  <h1 class="title">비밀번호 재설정</h1>
  <p class="sub">Reset Password</p>
  <p class="intro">가입한 이메일을 입력하시면<br>비밀번호 재설정 링크를 보내드려요.</p>

  <form id="resetForm" autocomplete="on">
    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
    </div>
    <button type="submit" class="btn" id="submitBtn">재설정 메일 보내기</button>
  </form>

  <div id="msg" class="msg"></div>

  <p class="alt">로그인 페이지로 <a href="/login.html">돌아가기 ←</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://rzlqlokqplhyntuirsmd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_A4HJDb41-YeAMIaRnB8KeQ_ssECgA6q';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const form = document.getElementById('resetForm');
const msg = document.getElementById('msg');
const btn = document.getElementById('submitBtn');

function showMsg(t, type){ msg.textContent = t; msg.className = 'msg ' + type; }

function ko(err){
  const m = (err && err.message ? err.message : String(err)).toLowerCase();
  if (m.includes('invalid email')) return '이메일 형식을 확인해주세요';
  if (m.includes('user not found')) return '가입되지 않은 이메일이에요';
  if (m.includes('rate limit') || m.includes('too many')) return '잠시 후 다시 시도해주세요';
  return '오류: ' + (err.message || err);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showMsg('이메일 형식을 확인해주세요', 'error'); return;
  }
  btn.disabled = true; btn.textContent = '발송 중…';
  msg.className = 'msg';
  try {
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://cecenglishcamp.com/reset-password.html'
    });
    if (error) throw error;
    showMsg('이메일을 확인해주세요! 비밀번호 재설정 링크를 보내드렸어요 📧', 'ok');
    btn.textContent = '메일 발송 완료';
  } catch (err) {
    showMsg('❌ ' + ko(err), 'error');
    btn.disabled = false;
    btn.textContent = '재설정 메일 보내기';
  }
});
</script>
