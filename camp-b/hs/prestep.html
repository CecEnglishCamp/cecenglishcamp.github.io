<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp B — High School · 수능 영어</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+KR:wght@400;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c14;
  --card: #111520;
  --border: #1e2438;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --text: #e8e4d8;
  --sub: #6e7490;
  --acc: #00c8ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NAV ── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 32px; border-bottom: 1px solid var(--border);
  background: rgba(10,12,20,0.92); position: sticky; top: 0; z-index: 10;
}
.nav-left { display: flex; align-items: center; gap: 12px; }
.nav-logo { width: 32px; height: 32px; }
.nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--text); letter-spacing: 1px; }
.nav-badge { background: #1a2040; color: var(--gold); font-size: 0.65rem; font-weight: 900; padding: 3px 10px; border-radius: 20px; border: 1px solid #2a3060; letter-spacing: 2px; }
.nav-links { display: flex; gap: 24px; }
.nav-links a { font-size: 0.78rem; color: var(--sub); text-decoration: none; letter-spacing: 1px; transition: color 0.2s; }
.nav-links a:hover { color: var(--text); }

/* ── HERO ── */
.hero {
  text-align: center; padding: 80px 20px 60px;
  background: radial-gradient(ellipse at 50% 0%, #1a1428 0%, var(--bg) 70%);
  border-bottom: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(201,168,76,0.03) 60px, rgba(201,168,76,0.03) 61px),
              repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(201,168,76,0.03) 60px, rgba(201,168,76,0.03) 61px);
  pointer-events: none;
}
.hero-eyebrow { font-size: 0.65rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 20px; font-weight: 900; }
.hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.4rem, 5vw, 3.8rem); font-weight: 500; line-height: 1.15; color: var(--text); margin-bottom: 12px; }
.hero-title em { color: var(--gold); font-style: italic; }
.hero-sub { font-size: 0.85rem; color: var(--sub); line-height: 1.7; margin-bottom: 36px; }
.hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-primary { background: var(--gold); color: #1a1000; border: none; border-radius: 4px; padding: 12px 32px; font-size: 0.85rem; font-weight: 900; cursor: pointer; letter-spacing: 1px; font-family: 'Nunito', sans-serif; transition: background 0.2s; }
.btn-primary:hover { background: var(--gold2); }
.btn-ghost { background: transparent; color: var(--gold); border: 1px solid #2a2010; border-radius: 4px; padding: 12px 24px; font-size: 0.85rem; font-weight: 700; cursor: pointer; letter-spacing: 1px; font-family: 'Nunito', sans-serif; transition: border-color 0.2s; }
.btn-ghost:hover { border-color: var(--gold); }

/* ── WEEK GRID ── */
.section { padding: 48px 24px; max-width: 860px; margin: 0 auto; }
.section-label { font-size: 0.6rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 8px; font-weight: 900; }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 500; color: var(--text); margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
.week-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.week-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
  text-decoration: none; display: block;
}
.week-card:hover { border-color: #2a2a40; background: #161928; }
.wc-num { font-size: 0.6rem; letter-spacing: 3px; color: var(--sub); margin-bottom: 6px; }
.wc-title { font-size: 0.88rem; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
.wc-type { font-size: 0.7rem; color: var(--gold); }
.wc-bar { height: 2px; background: var(--border); border-radius: 2px; margin-top: 12px; overflow: hidden; }
.wc-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; width: 0%; }

/* ── OVERLAY ── */
#tut-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
#tut-overlay.show { opacity: 1; pointer-events: all; }
.tut-popup {
  background: var(--card); border: 1px solid #2a2030;
  border-radius: 12px; width: 360px; max-width: 92vw;
  padding: 0; overflow: hidden;
  transform: translateY(16px); transition: transform 0.3s;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
}
#tut-overlay.show .tut-popup { transform: translateY(0); }
.tut-top { background: linear-gradient(135deg, #12101e, #1a1428); padding: 24px 24px 20px; border-bottom: 1px solid #1e1828; }
.tut-progress { display: flex; gap: 6px; margin-bottom: 16px; }
.tut-dot { flex: 1; height: 2px; background: #2a2440; border-radius: 2px; transition: background 0.3s; }
.tut-dot.done { background: var(--gold); }
.tut-step-label { font-size: 0.6rem; letter-spacing: 3px; color: var(--gold); margin-bottom: 6px; font-weight: 900; }
.tut-step-title { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; color: var(--text); font-weight: 500; }
.tut-body { padding: 20px 24px; min-height: 160px; }
.tut-icon { font-size: 2rem; margin-bottom: 12px; }
.tut-desc { font-size: 0.83rem; color: #9ea8c0; line-height: 1.75; margin-bottom: 12px; }
.tut-example {
  background: #0d1020; border-left: 2px solid #2a2440; border-radius: 0 6px 6px 0;
  padding: 10px 14px; font-size: 0.76rem; color: var(--sub); line-height: 1.65;
}
.tut-example strong { color: var(--gold); }
.tut-footer { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-top: 1px solid #1a1828; }
.tut-skip { font-size: 0.72rem; color: var(--sub); background: none; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; }
.tut-skip:hover { color: var(--text); }
.tut-next { background: var(--gold); color: #1a1000; border: none; border-radius: 4px; padding: 9px 22px; font-size: 0.82rem; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; letter-spacing: 0.5px; transition: background 0.15s; }
.tut-next:hover { background: var(--gold2); }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <img class="nav-logo" src="https://cecenglishcamp.github.io/robo_icon.png" onerror="this.style.display='none'">
    <span class="nav-brand">CEC English Camp</span>
    <span class="nav-badge">CAMP B · HIGH SCHOOL</span>
  </div>
  <div class="nav-links">
    <a href="https://cecenglishcamp.github.io/GrammarGame/index.html">Grammar Game</a>
    <a href="https://cecenglishcamp.github.io/GrammarBaseCamp/index.html">Grammar Base</a>
    <a href="https://cecenglishcamp.github.io/camp-b/index.html">← Back</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">CEC ENGLISH CAMP — HIGH SCHOOL</div>
  <div class="hero-title">수능 영어,<br><em>문학으로 완성하다</em></div>
  <div class="hero-sub">
    실제 수능 유형 훈련 · AI 오답 분석 · 고1~고3<br>
    틀린 문제를 AI가 바로 설명해드려요
  </div>
  <div class="hero-actions">
    <button class="btn-primary" onclick="document.querySelector('.section').scrollIntoView({behavior:'smooth'})">수업 시작하기</button>
    <button class="btn-ghost" onclick="showTutorial()">수업 안내 보기</button>
  </div>
</div>

<!-- WEEK LIST -->
<div class="section">
  <div class="section-label">CURRICULUM</div>
  <div class="section-title">고1 · The Great Gatsby</div>
  <div class="week-grid" id="week-grid"></div>
</div>

<!-- TUTORIAL POPUP -->
<div id="tut-overlay">
  <div class="tut-popup">
    <div class="tut-top">
      <div class="tut-progress" id="tut-progress"></div>
      <div class="tut-step-label" id="tut-step-label"></div>
      <div class="tut-step-title" id="tut-step-title"></div>
    </div>
    <div class="tut-body" id="tut-body"></div>
    <div class="tut-footer">
      <button class="tut-skip" onclick="closeTutorial()">건너뛰기</button>
      <button class="tut-next" id="tut-next" onclick="nextStep()">다음 →</button>
    </div>
  </div>
</div>

<script>
const STEPS = [
  {
    label: 'STEP 01 / 03',
    title: '수능 빈칸 추론이란?',
    icon: '📝',
    desc: '수능 영어 29~34번 유형이에요. 지문의 논리 구조를 파악해 빈칸에 들어갈 말을 고르는 문제예요.\n\n대조(not A but B), 반복 강조, 예시-일반화 패턴이 핵심이에요.',
    example: '<strong>핵심 전략:</strong> 빈칸 앞뒤 연결어를 먼저 파악하세요.\nnot / however / instead → 빈칸은 반대 개념'
  },
  {
    label: 'STEP 02 / 03',
    title: '오답 분석 방법',
    icon: '🔍',
    desc: '문제를 틀렸을 때 "AI 설명 요청" 버튼을 누르세요.\n\nOpen WebUI에서 AI 선생님이 오답 이유와 지문 논리 구조를 단계별로 설명해줘요.',
    example: '<strong>AI가 설명해주는 것:</strong>\n① 지문 논리 구조 분석\n② 왜 정답인지 / 오답인지\n③ 같은 유형 풀이 전략'
  },
  {
    label: 'STEP 03 / 03',
    title: '준비 완료!',
    icon: '🎯',
    desc: '매주 지문 1개 + 수능 유형 문제 3~5개가 제공돼요.\n\n틀린 문제는 AI와 함께 바로 분석하고, 다음 주에 다시 도전해보세요.',
    example: '<strong>수업 흐름:</strong>\n① 지문 읽기 → ② 문제 풀기\n③ 틀리면 AI 오답 분석\n④ 전략 익히고 다음 주로'
  }
];

let currentStep = 0;

function renderStep() {
  const s = STEPS[currentStep];
  const total = STEPS.length;

  // progress dots
  const prog = document.getElementById('tut-progress');
  prog.innerHTML = STEPS.map((_, i) =>
    `<div class="tut-dot ${i <= currentStep ? 'done' : ''}"></div>`
  ).join('');

  document.getElementById('tut-step-label').textContent = s.label;
  document.getElementById('tut-step-title').textContent = s.title;
  document.getElementById('tut-body').innerHTML =
    `<div class="tut-icon">${s.icon}</div>` +
    `<div class="tut-desc" style="white-space:pre-line;">${s.desc}</div>` +
    `<div class="tut-example" style="white-space:pre-line;">${s.example}</div>`;

  const btn = document.getElementById('tut-next');
  btn.textContent = currentStep === total - 1 ? '시작하기 ✓' : '다음 →';
}

function nextStep() {
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStep();
  } else {
    closeTutorial();
  }
}

function closeTutorial() {
  document.getElementById('tut-overlay').classList.remove('show');
  localStorage.setItem('cec_hs_tutorial_done', '1');
}

function showTutorial() {
  currentStep = 0;
  renderStep();
  document.getElementById('tut-overlay').classList.add('show');
}

// Auto-show for first-time visitors
if (!localStorage.getItem('cec_hs_tutorial_done')) {
  setTimeout(showTutorial, 600);
}

// Generate week cards
const weeks = [
  { num:'W01', title:'The Green Light', type:'빈칸 추론', done: true },
  { num:'W02', title:'Old Money & New', type:'순서 배열', done: false },
  { num:'W03', title:'The Valley of Ashes', type:'문장 삽입', done: false },
  { num:'W04', title:'The Party at Gatsby\'s', type:'빈칸 추론', done: false },
  { num:'W05', title:'Tom and Daisy', type:'어법·어휘', done: false },
  { num:'W06', title:'The Reunion', type:'빈칸 추론', done: false },
];

const grid = document.getElementById('week-grid');
weeks.forEach((w, i) => {
  const card = document.createElement('a');
  card.className = 'week-card';
  card.href = w.done ? `week${String(i+1).padStart(2,'0')}.html` : '#';
  card.innerHTML = `
    <div class="wc-num">WEEK ${w.num.replace('W','')}</div>
    <div class="wc-title">${w.title}</div>
    <div class="wc-type">${w.type}</div>
    <div class="wc-bar"><div class="wc-bar-fill" style="width:${w.done?'100':'0'}%"></div></div>
  `;
  if (!w.done) card.style.opacity = '0.5';
  grid.appendChild(card);
});
</script>
</body>
</html>
