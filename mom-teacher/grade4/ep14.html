<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Mom Teacher G4 EP14 | CEC English Camp</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f7f4ee;color:#2d3748;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.card{max-width:520px;width:100%;background:#fff;border-radius:18px;padding:36px 28px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.icon{font-size:42px;margin-bottom:16px}
.title{font-size:1.35rem;font-weight:900;color:#4a7c59;margin-bottom:18px;line-height:1.45}
.body{font-size:0.95rem;line-height:1.95;color:#4a5568;margin-bottom:24px}
.brand{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:#4a7c59;margin-bottom:30px;letter-spacing:0.02em}
.actions{display:flex;flex-direction:column;gap:10px}
.btn{display:block;padding:13px 20px;background:#4a7c59;color:#fff;text-decoration:none;border-radius:12px;font-size:0.92rem;font-weight:700;transition:background 0.2s}
.btn:hover{background:#3d6b4a}
.btn-secondary{background:#e8f5e9;color:#4a7c59}
.btn-secondary:hover{background:#d0e8d3}
@media (max-width:480px){.card{padding:28px 20px}.title{font-size:1.18rem}}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📝</div>
  <div class="title">이 페이지는 정식 교체 작업 중입니다</div>
  <div class="body">
    이 학습 페이지는 저작권 안전 검토와 교재 개편을 위해 잠시 준비 중입니다.<br>
    곧 CEC 영어캠프의 새로운 창작형 교재로 다시 제공됩니다.
  </div>
  <div class="brand">CecEnglishCamp.com</div>
  <div class="actions">
    <a href="/camp-a/grade4/" class="btn">다른 주차 보기 →</a>
    <a href="/" class="btn btn-secondary">홈으로 →</a>
  </div>
</div>
<script src="/assets/security.js"></script>
</body>
</html>
