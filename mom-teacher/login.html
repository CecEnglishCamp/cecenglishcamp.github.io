<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — Mom Teacher | CEC English Camp</title>
<meta name="description" content="Mom Teacher 무료체험 로그인. 등록하신 이메일과 비밀번호로 입장하세요.">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-58N1MFP27H"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-58N1MFP27H');</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 36px;height:64px;background:#000;border-bottom:1px solid rgba(0,255,255,.13);position:fixed;top:0;left:0;right:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{width:32px;height:32px;object-fit:contain;border-radius:8px}
.nav-logo-text{font-size:1rem;font-weight:800;color:#fff}
.nav-back{color:rgba(255,255,255,.6);font-size:.88rem;text-decoration:none;transition:color .2s}
.nav-back:hover{color:#00ffff}
main{flex:1;padding:100px 24px 60px;display:flex;flex-direction:column;align-items:center}
.hero-box{max-width:520px;width:100%;text-align:center;margin-bottom:32px}
.eyebrow{font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#00ffff;margin-bottom:14px}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,2.4rem);font-weight:700;line-height:1.12;margin-bottom:12px}
.sub{font-size:.88rem;color:rgba(255,255,255,.45);line-height:1.7}
.form-wrap{max-width:460px;width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px 36px}
@media(max-width:480px){.form-wrap{padding:28px 20px}}
.field{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
label{font-size:.85rem;font-weight:600;color:rgba(255,255,255,.75)}
input{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:13px 16px;color:#fff;font-family:'Outfit',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s;width:100%}
input::placeholder{color:rgba(255,255,255,.25)}
input:focus{border-color:rgba(0,255,255,.5)}
.submit-btn{width:100%;padding:16px;background:#00ffff;color:#000;font-family:'Outfit',sans-serif;font-weight:800;font-size:1rem;border:none;border-radius:50px;cursor:pointer;transition:all .2s;margin-top:8px}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,255,255,.35)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error-msg{display:none;margin-top:16px;padding:14px 18px;border-radius:10px;background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.25);color:rgba(255,120,120,.9);font-size:.85rem;line-height:1.6;text-align:center}
.error-msg.show{display:block}
.error-msg a{color:rgba(0,255,255,.7);text-decoration:none}
.divider{text-align:center;font-size:.82rem;color:rgba(255,255,255,.3);margin:24px 0 20px;display:flex;align-items:center;gap:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
.register-link{display:block;text-align:center;margin-bottom:12px}
.register-link a{display:inline-block;padding:13px 28px;border:1.5px solid rgba(0,255,255,.3);color:#00ffff;font-weight:700;font-size:.9rem;border-radius:50px;text-decoration:none;transition:all .2s}
.register-link a:hover{background:rgba(0,255,255,.08);border-color:#00ffff}
.notice{font-size:.78rem;color:rgba(255,255,255,.25);text-align:center;margin-top:16px}
footer{text-align:center;padding:28px 24px;border-top:1px solid rgba(255,255,255,.06)}
footer a{color:rgba(255,255,255,.3);font-size:.8rem;text-decoration:none;margin:0 10px;transition:color .2s}
footer a:hover{color:#00ffff}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <img src="/assets/images/robo.png" alt="CEC" onerror="this.style.display='none'">
    <span class="nav-logo-text">CEC English Camp</span>
  </a>
  <a href="/mom-teacher/" class="nav-back">← Mom Teacher</a>
</nav>

<main>
  <div class="hero-box">
    <p class="eyebrow">Mom Teacher Trial</p>
    <h1>체험 수업 입장</h1>
    <p class="sub">등록하신 이메일과 비밀번호로 로그인하세요.<br>Peter Rabbit EP01~EP07, Picture Speaking 체험 수업에 입장할 수 있습니다.</p>
  </div>

  <div class="form-wrap">
    <form id="loginForm">
      <div class="field">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="등록하신 이메일" required autocomplete="email">
      </div>
      <div class="field">
        <label for="pw">비밀번호</label>
        <input type="password" id="pw" placeholder="비밀번호" required autocomplete="current-password">
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">로그인 후 수업 입장</button>
      <div class="error-msg" id="errMsg">
        등록된 이메일과 비밀번호를 확인해 주세요.<br>
        <a href="/mom-teacher/register.html">아직 등록하지 않으셨나요? 7일 무료체험 등록하기 →</a>
      </div>
    </form>

    <div class="divider">7일 무료체험 (카드 등록 없음)</div>
    <p class="register-link"><a href="/mom-teacher/register.html">무료체험 신규 등록하기 →</a></p>
    <p class="notice">이름, 전화번호, 이메일, 비밀번호 등록 후 체험 수업에 입장합니다.</p>
  </div>
</main>

<footer>
  <a href="/">홈</a>
  <a href="/mom-teacher/">Mom Teacher</a>
  <a href="/legal/privacy.html">Privacy</a>
</footer>

<script>
// 임시 보호 — localStorage 기반 게이트. 실제 보안은 서버 인증/Supabase Auth 필요.
(function(){
  var s=localStorage.getItem('cec_mom_trial_session');
  if(s){try{var d=JSON.parse(s);if(d.exp&&Date.now()<d.exp){location.replace(getNextUrl());return;}}catch(e){}}
})();

function getNextUrl(){
  var p=new URLSearchParams(location.search);
  var n=p.get('next')||'';
  if(n==='trial'||n==='trial-dashboard')return'/mom-teacher/trial-dashboard.html';
  if(n&&n.startsWith('/'))return n;
  return'/mom-teacher/trial-dashboard.html';
}

document.getElementById('loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  var email=document.getElementById('email').value.trim().toLowerCase();
  var pw=document.getElementById('pw').value;
  var errEl=document.getElementById('errMsg');
  var btn=document.getElementById('submitBtn');

  errEl.classList.remove('show');
  btn.disabled=true;btn.textContent='확인 중...';

  var users=JSON.parse(localStorage.getItem('cec_mom_users')||'[]');
  var user=users.find(function(u){return u.email===email;});

  if(!user||user.pw!==btoa(unescape(encodeURIComponent(pw)))){
    errEl.classList.add('show');
    btn.disabled=false;btn.textContent='로그인 후 수업 입장';return;
  }

  // 세션 갱신 (7일)
  var session={email:email,name:user.name,exp:Date.now()+7*24*60*60*1000};
  localStorage.setItem('cec_mom_trial_session',JSON.stringify(session));

  location.replace(getNextUrl());
});
</script>
</body>
</html>
