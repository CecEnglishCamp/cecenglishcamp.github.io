<html lang="ko">
<head>
<meta charset="UTF-8">

<title>7일 무료체험 등록 — Mom Teacher | CEC English Camp</title>
<meta name="description" content="카드 등록 없이 7일 무료체험을 시작할 수 있습니다. 이름, 전화번호, 이메일, 비밀번호만 등록하세요.">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 36px;height:64px;background:#000;border-bottom:1px solid rgba(0,255,255,.13);position:fixed;top:0;left:0;right:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{width:32px;height:32px;object-fit:contain;border-radius:8px}
.nav-logo-text{font-size:1rem;font-weight:800;color:#fff}
.nav-back{color:rgba(255,255,255,.6);font-size:.88rem;text-decoration:none;transition:color .2s}
.nav-back:hover{color:#00ffff}
main{flex:1;padding:100px 24px 60px;display:flex;flex-direction:column;align-items:center}
.hero-box{max-width:560px;width:100%;text-align:center;margin-bottom:36px}
.eyebrow{font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#00ffff;margin-bottom:14px}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;line-height:1.12;margin-bottom:16px}
.badges{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:16px 0}
.badge{font-size:.78rem;font-weight:600;padding:6px 16px;border-radius:50px;background:rgba(0,255,255,.08);color:#00ffff;border:1px solid rgba(0,255,255,.3)}
.sub{font-size:.88rem;color:rgba(255,255,255,.45);line-height:1.7;margin-top:10px}
.form-wrap{max-width:520px;width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px 36px}
@media(max-width:520px){.form-wrap{padding:28px 20px}}
.field{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
label{font-size:.85rem;font-weight:600;color:rgba(255,255,255,.75)}
label .req{color:#00ffff;margin-left:3px}
input{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:13px 16px;color:#fff;font-family:'Outfit',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s;width:100%}
input::placeholder{color:rgba(255,255,255,.25)}
input:focus{border-color:rgba(0,255,255,.5)}
.hint{font-size:.75rem;color:rgba(255,255,255,.3);margin-top:4px}
.submit-btn{width:100%;padding:16px;background:#00ffff;color:#000;font-family:'Outfit',sans-serif;font-weight:800;font-size:1rem;border:none;border-radius:50px;cursor:pointer;transition:all .2s;margin-top:8px}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,255,255,.35)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error-msg{display:none;margin-top:16px;padding:14px 18px;border-radius:10px;background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.25);color:rgba(255,120,120,.9);font-size:.85rem;line-height:1.6;text-align:center}
.error-msg.show{display:block}
.divider{text-align:center;font-size:.82rem;color:rgba(255,255,255,.3);margin:24px 0 20px;display:flex;align-items:center;gap:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
.login-link{display:block;text-align:center;font-size:.88rem;color:rgba(255,255,255,.5)}
.login-link a{color:#00ffff;text-decoration:none;font-weight:700}
.login-link a:hover{text-decoration:underline}
.notice{font-size:.75rem;color:rgba(255,255,255,.25);text-align:center;margin-top:20px;line-height:1.6}
.notice a{color:rgba(0,255,255,.4);text-decoration:none}
footer{text-align:center;padding:28px 24px;border-top:1px solid rgba(255,255,255,.06)}
footer a{color:rgba(255,255,255,.3);font-size:.8rem;text-decoration:none;margin:0 10px;transition:color .2s}
footer a:hover{color:#00ffff}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <img src="/assets/images/robo.png" alt="CEC" onerror="this.style.display='none'">
    <span class="nav-logo-text">CEC English Camp</span>
  </a>
  <a href="/mom-teacher/" class="nav-back">← Mom Teacher</a>
</nav>

<main>
  <div class="hero-box">
    <p class="eyebrow">Mom Teacher Trial</p>
    <h1>7일 무료체험<br>등록</h1>
    <div class="badges">
      <span class="badge">✓ 카드 등록 없음</span>
      <span class="badge">✓ 7일 무료체험</span>
      <span class="badge">✓ 즉시 입장 가능</span>
    </div>
    <p class="sub">카드 등록 없이 7일 무료체험을 시작할 수 있습니다.<br>이름, 전화번호, 이메일, 비밀번호 등록 후 체험 수업에 입장하세요.</p>
  </div>

  <div class="form-wrap">
    <form id="regForm">
      <div class="field">
        <label for="name">엄마 이름<span class="req">*</span></label>
        <input type="text" id="name" name="name" placeholder="성함을 입력하세요" required autocomplete="name">
      </div>
      <div class="field">
        <label for="phone">전화번호<span class="req">*</span></label>
        <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" required autocomplete="tel">
      </div>
      <div class="field">
        <label for="email">이메일<span class="req">*</span></label>
        <input type="email" id="email" name="email" placeholder="email@example.com" required autocomplete="email">
        <span class="hint">로그인 시 사용할 이메일 주소입니다.</span>
      </div>
      <div class="field">
        <label for="pw">비밀번호<span class="req">*</span></label>
        <input type="password" id="pw" name="pw" placeholder="6자리 이상" required minlength="6" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="pw2">비밀번호 확인<span class="req">*</span></label>
        <input type="password" id="pw2" name="pw2" placeholder="비밀번호를 다시 입력하세요" required autocomplete="new-password">
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">7일 무료체험 시작하기</button>
      <div class="error-msg" id="errMsg"></div>
    </form>

    <div class="divider">이미 등록하셨나요?</div>
    <p class="login-link"><a href="/mom-teacher/login.html">이메일 + 비밀번호로 로그인하기 →</a></p>

    <p class="notice">
      입력하신 정보는 체험 안내 및 로그인 목적으로만 사용됩니다.<br>
      <!-- 임시 보호 — 실제 보안은 서버 인증/Supabase Auth로 교체 필요 -->
      <a href="/legal/privacy.html">개인정보 처리방침</a>
    </p>
  </div>
</main>

<footer>
  <a href="/">홈</a>
  <a href="/mom-teacher/">Mom Teacher</a>
  <a href="/legal/privacy.html">Privacy</a>
  <a href="/legal/terms.html">Terms</a>
</footer>

<script>
// 임시 보호 — localStorage 기반 게이트. 실제 보안은 서버 인증/Supabase Auth 필요.
(function(){
  var s=localStorage.getItem('cec_mom_trial_session');
  if(s){try{var d=JSON.parse(s);if(d.exp&&Date.now()<d.exp){location.replace(getNextUrl());return;}}catch(e){}}
})();

function getNextUrl(){
  var p=new URLSearchParams(location.search);
  var n=p.get('next')||'';
  if(n==='trial'||n==='trial-dashboard')return'/mom-teacher/trial-dashboard.html';
  if(n&&n.startsWith('/'))return n;
  return'/mom-teacher/trial-dashboard.html';
}

document.getElementById('regForm').addEventListener('submit',function(e){
  e.preventDefault();
  var name=document.getElementById('name').value.trim();
  var phone=document.getElementById('phone').value.trim();
  var email=document.getElementById('email').value.trim().toLowerCase();
  var pw=document.getElementById('pw').value;
  var pw2=document.getElementById('pw2').value;
  var errEl=document.getElementById('errMsg');
  var btn=document.getElementById('submitBtn');

  errEl.classList.remove('show');

  if(pw!==pw2){
    errEl.textContent='비밀번호가 일치하지 않습니다.';
    errEl.classList.add('show');return;
  }
  if(pw.length<6){
    errEl.textContent='비밀번호는 6자리 이상이어야 합니다.';
    errEl.classList.add('show');return;
  }

  // 이미 등록된 이메일 확인
  var users=JSON.parse(localStorage.getItem('cec_mom_users')||'[]');
  if(users.find(function(u){return u.email===email;})){
    errEl.textContent='이미 등록된 이메일입니다. 로그인 페이지를 이용해 주세요.';
    errEl.classList.add('show');return;
  }

  btn.disabled=true;
  btn.textContent='등록 중...';

  // 사용자 저장
  var newUser={name:name,phone:phone,email:email,pw:btoa(unescape(encodeURIComponent(pw))),created:Date.now()};
  users.push(newUser);
  localStorage.setItem('cec_mom_users',JSON.stringify(users));

  // 세션 설정 (7일)
  var session={email:email,name:name,exp:Date.now()+7*24*60*60*1000};
  localStorage.setItem('cec_mom_trial_session',JSON.stringify(session));

  // 배경에서 Formspree 리드 캡처 (선택)
  try{
    var fd=new FormData();
    fd.append('form_type','mom-teacher-register');
    fd.append('mom_name',name);fd.append('email',email);fd.append('phone',phone);
    fetch('https://formspree.io/f/mjgqbwor',{method:'POST',body:fd,headers:{Accept:'application/json'}});
  }catch(ex){}

  // 체험 대시보드로 이동
  setTimeout(function(){location.replace(getNextUrl());},300);
});
</script>
</body>
</html>
