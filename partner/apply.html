<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEC 파트너 신청서 | CEC English Camp</title>
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://cecenglishcamp.com/partner/apply.html">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0a1628;--blue:#1e3a8a;--cyan:#00bcd4;--green:#16a34a;--red:#dc2626;--border:rgba(255,255,255,.12)}
body{background:#0a1628;color:#e6edf3;font-family:'Noto Sans KR',sans-serif;line-height:1.8}
h1{font-family:'Cormorant Garamond',serif;color:#fff}
.top{padding:14px 20px;border-bottom:1px solid var(--border)}
.top a{color:#e6edf3;text-decoration:none;font-weight:700}
.wrap{max-width:620px;margin:0 auto;padding:28px 18px 60px}
.hh{text-align:center;margin-bottom:22px}
.hh h1{font-size:2rem}.hh p{color:rgba(230,237,243,.6);font-size:.92rem;margin-top:6px}
.field{margin-bottom:18px}
label.lab{display:block;font-weight:600;margin-bottom:7px;font-size:.95rem}
.req{color:#f87171}
input[type=text],input[type=tel],input[type=email],select,textarea{width:100%;padding:12px 14px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:#fff;font-family:inherit;font-size:.95rem}
textarea{min-height:90px;resize:vertical}
.radios{display:flex;gap:10px;flex-wrap:wrap}
.radios label{flex:1;min-width:90px;text-align:center;padding:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:.92rem}
.radios input{display:none}
.radios input:checked+span{color:var(--cyan);font-weight:700}
.track label{display:block;text-align:left}
.chk{display:flex;gap:10px;align-items:flex-start;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:9px;font-size:.9rem;cursor:pointer}
.chk input{margin-top:4px}
.hint{font-size:.8rem;color:rgba(230,237,243,.5);margin-top:5px}
.submit{width:100%;padding:16px;background:var(--cyan);color:#04141f;border:none;border-radius:12px;font-size:1.05rem;font-weight:800;font-family:inherit;cursor:pointer;margin-top:8px}
.submit:disabled{opacity:.6;cursor:wait}
.msg{display:none;margin-top:16px;padding:16px;border-radius:12px;text-align:center;font-weight:600}
.msg.ok{display:block;background:rgba(22,163,74,.15);border:1px solid var(--green);color:#86efac}
.msg.err{display:block;background:rgba(220,38,38,.15);border:1px solid var(--red);color:#fca5a5}
#employerWrap{display:none}
</style>
</head>
<body>
<div class="top"><a href="/partner/">← CEC 파트너</a></div>
<div class="wrap">
  <div class="hh"><h1>파트너 신청서</h1><p>제출 후 줌(Zoom) 1:1 상담을 안내드립니다. 부담 없이 작성하세요 🙂</p></div>

  <form id="applyForm">
    <div class="field">
      <label class="lab">지원 트랙 <span class="req">*</span></label>
      <div class="radios track">
        <label><input type="radio" name="track" value="A"><span>🟢 A · 엄마(자녀有)</span></label>
        <label><input type="radio" name="track" value="B"><span>🔵 B · 일반(자녀無)</span></label>
        <label><input type="radio" name="track" value="C"><span>🟠 C · 경력(교사/강사)</span></label>
      </div>
    </div>

    <div class="field"><label class="lab">성명 <span class="req">*</span></label><input type="text" id="name" required></div>
    <div class="field"><label class="lab">연락처(휴대폰) <span class="req">*</span></label><input type="tel" id="phone" placeholder="010-0000-0000" required></div>
    <div class="field"><label class="lab">이메일 <span class="req">*</span></label><input type="email" id="email" required></div>
    <div class="field"><label class="lab">거주 지역 / 아파트 단지</label><input type="text" id="region" placeholder="예: 성남 분당 OO단지"></div>

    <div class="field"><label class="lab">영어 가능 수준</label>
      <select id="english_level"><option value="">선택</option><option>상</option><option>중</option><option>하 (아이와 함께 배우는 의지)</option></select>
    </div>

    <div class="field"><label class="lab">자녀 유무</label>
      <div class="radios"><label><input type="radio" name="child" value="Y"><span>있음</span></label><label><input type="radio" name="child" value="N"><span>없음</span></label></div>
    </div>

    <div class="field"><label class="lab">현재 타 영어교육업체에 재직 중인가요?</label>
      <div class="radios"><label><input type="radio" name="emp" value="Y"><span>예</span></label><label><input type="radio" name="emp" value="N"><span>아니오</span></label></div>
      <div id="employerWrap" style="margin-top:10px"><input type="text" id="employer" placeholder="업체명 / 예상 퇴직 시기"></div>
    </div>

    <div class="field"><label class="lab">전/현 직장 계약서에 '경업금지·고객유인금지' 조항을 인지하고 있나요?</label>
      <div class="radios"><label><input type="radio" name="nc" value="Y"><span>예</span></label><label><input type="radio" name="nc" value="N"><span>아니오</span></label><label><input type="radio" name="nc" value="모름"><span>잘 모름</span></label></div>
      <div class="hint">※ 조항이 있으면 본인 계약서 확인을 권장하며, 필요 시 법률 검토를 안내합니다.</div>
    </div>

    <div class="field">
      <label class="lab">합법 활동 서약 <span class="req">*</span></label>
      <label class="chk"><input type="checkbox" id="a1"><span>기존(현/전 직장) 담당 학생을 유인하거나 데려올 의사가 없습니다.</span></label>
      <label class="chk"><input type="checkbox" id="a2"><span>CEC 활동은 새로 모집한 이웃 학생으로만 수행합니다.</span></label>
      <label class="chk"><input type="checkbox" id="a3"><span>전 직장의 고객 명단·영업비밀·교재를 사용하지 않습니다.</span></label>
    </div>

    <div class="field"><label class="lab">하고 싶은 말 (선택)</label><textarea id="message" placeholder="간단한 자기소개나 질문을 남겨주세요"></textarea></div>

    <div class="field">
      <label class="chk"><input type="checkbox" id="privacy"><span><b>[필수]</b> 개인정보(성명·연락처·이메일·지역) 수집·이용에 동의합니다. (파트너 심사·연락 목적)</span></label>
    </div>

    <button type="submit" class="submit" id="submitBtn">신청서 제출하기</button>
    <div class="msg" id="msg"></div>
  </form>
</div>

<script>
var SUPA_URL='https://rzlqlokqplhyntuirsmd.supabase.co';
var SUPA_KEY='sb_publishable_A4HJDb41-YeAMIaRnB8KeQ_ssECgA6q';
var sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);

// 재직 '예' 선택 시 업체명 입력란 표시
document.querySelectorAll('input[name=emp]').forEach(function(r){
  r.addEventListener('change',function(){
    document.getElementById('employerWrap').style.display = (this.value==='Y') ? 'block' : 'none';
  });
});

function val(name){var el=document.querySelector('input[name="'+name+'"]:checked');return el?el.value:null;}
function msg(type,text){var m=document.getElementById('msg');m.className='msg '+type;m.textContent=text;}

document.getElementById('applyForm').addEventListener('submit', async function(e){
  e.preventDefault();
  var track=val('track'), name=document.getElementById('name').value.trim(),
      phone=document.getElementById('phone').value.trim(), email=document.getElementById('email').value.trim();
  // 필수 검증
  if(!track){return msg('err','지원 트랙을 선택해주세요.');}
  if(!name||!phone||!email){return msg('err','성명·연락처·이메일은 필수입니다.');}
  if(!document.getElementById('a1').checked||!document.getElementById('a2').checked||!document.getElementById('a3').checked){
    return msg('err','합법 활동 서약 3가지에 모두 동의해주세요.');}
  if(!document.getElementById('privacy').checked){return msg('err','개인정보 수집·이용 동의가 필요합니다.');}

  var emp=val('emp'); var child=val('child');
  var payload={
    track:track, name:name, phone:phone, email:email,
    region:document.getElementById('region').value.trim()||null,
    english_level:document.getElementById('english_level').value||null,
    has_child: child===null?null:(child==='Y'),
    currently_employed: emp===null?null:(emp==='Y'),
    employer: document.getElementById('employer').value.trim()||null,
    noncompete_aware: val('nc'),
    agree_no_solicit:true, agree_new_only:true, agree_no_data:true,
    message:document.getElementById('message').value.trim()||null
  };
  var btn=document.getElementById('submitBtn'); btn.disabled=true; btn.textContent='제출 중...';
  try{
    var r=await sb.from('partner_applications').insert(payload);
    if(r.error) throw r.error;
    document.getElementById('applyForm').reset();
    document.getElementById('employerWrap').style.display='none';
    msg('ok','✅ 신청이 접수되었습니다! 영업일 내 줌 상담 안내를 드리겠습니다. 감사합니다 🙂');
  }catch(err){
    console.error(err);
    msg('err','⚠️ 제출 중 오류가 발생했습니다. 잠시 후 다시 시도하시거나 CecEnglishCamp@gmail.com 으로 연락주세요.');
  }finally{ btn.disabled=false; btn.textContent='신청서 제출하기'; }
});
</script>
</body>
</html>
