<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEC 테스트 모드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;color:#E8DFC8;min-height:100vh;padding:40px 20px}
.wrap{max-width:480px;margin:0 auto}
h1{font-size:24px;color:#fff;margin-bottom:6px}
.badge{display:inline-block;background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:#34D399;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;margin-bottom:24px}
.section{margin-bottom:28px}
.section h2{font-size:13px;color:#C9A84C;letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}
.link{display:block;padding:12px 16px;background:#0C1428;border:1px solid rgba(201,168,76,0.12);border-radius:8px;color:#E8DFC8;text-decoration:none;margin-bottom:8px;font-size:14px;transition:all .2s}
.link:hover{border-color:#C9A84C;transform:translateX(4px)}
.link span{color:#8A9AB0;font-size:12px;float:right}
.info{margin-top:24px;padding:14px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:8px;font-size:12px;color:#8A9AB0;line-height:1.7}
.info code{color:#E8C96A;font-size:11px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🧪 CEC 테스트 모드</h1>
  <div class="badge">SESSION SET</div>

  <div class="section">
    <h2>중학교 테스트</h2>
    <a class="link" href="camp-b/m1/week01.html">중1 W01 <span>Huckleberry Finn</span></a>
    <a class="link" href="camp-b/m2/week01.html">중2 W01 <span>War of the Worlds</span></a>
    <a class="link" href="camp-b/m3/week01.html">중3 W01 <span>Sherlock Holmes</span></a>
  </div>

  <div class="section">
    <h2>고등학교 테스트</h2>
    <a class="link" href="camp-b/hs/g1/week01.html">고1 W01 <span>준비 중</span></a>
    <a class="link" href="camp-b/hs/g2/week01.html">고2 W01 <span>준비 중</span></a>
    <a class="link" href="camp-b/hs/g3/week01.html">고3 W01 <span>준비 중</span></a>
  </div>

  <div class="section">
    <h2>Open WebUI</h2>
    <a class="link" href="https://journey-bronzy-fruitily.ngrok-free.dev" target="_blank">AI 연결 <span>Open WebUI →</span></a>
  </div>

  <div class="info">
    <strong>자동 설정된 세션:</strong><br>
    <code>cecAuthB = {name:"성태", grade:1, energy:5, interests:"테스트"}</code>
  </div>
</div>

<script>
sessionStorage.setItem('cecAuthB', JSON.stringify({
  tag: '[PRESTEP] name=성태 grade=1 energy=5 interests=테스트 goal=테스트 camp=B',
  ts: Date.now(),
  name: '성태',
  grade: 1,
  energy: 5,
  interests: '테스트',
  goal: '테스트'
}));
</script>
</body>
</html>
