<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>수업 시작</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100vh;
      font-family:'Noto Sans KR', sans-serif;
      color:#fff;
      gap:24px;
    }
    .title { font-size:24px; color:#00f2ff; }
    .sub { font-size:14px; color:#888; }
    button {
      padding:16px 40px;
      background:#00f2ff;
      color:#000;
      border:none;
      border-radius:12px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
    }
    button:hover { background:#00c8d4; }
  </style>
</head>
<body>
  <div class="title">📖 수업 + 🤖 AI 튜터 동시 열기</div>
  <div class="sub">버튼을 누르면 화면이 좌우로 자동 분할됩니다</div>
  <button onclick="openBoth()">시작하기 →</button>
  <script>
    function openBoth() {
      const W = screen.width;
      const H = screen.height;
      // 수업 창: 왼쪽 50%
      window.open(
        'https://cecenglishcamp.github.io/camp-a/lessons/grade3/week01.html',
        'lesson',
        `width=${W/2},height=${H},left=0,top=0`
      );
      // ChatGPT 창: 오른쪽 50%
      window.open(
        'https://chatgpt.com/g/g-69b4931ba6d4819194bb864aed20723b-yeongeo-tyuteo-cec-englishcamp-a',
        'chatgpt',
        `width=${W/2},height=${H},left=${W/2},top=0`
      );
    }
  </script>
</body>
</html>
