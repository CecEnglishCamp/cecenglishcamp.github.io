<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>CEC Launcher - Peter Rabbit W1</title>
  <style>
    body { margin:0; }
    .launcher-header {
      height: 60px;
      background: linear-gradient(135deg, #2a4a2e, #4a6b4e);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,242,255,0.15);
      border-bottom: 1px solid #00f2ff;
    }
    .launcher-title {
      color: #00f2ff;
      font-weight: bold;
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .ai-tutor-btn {
      background: #00f2ff;
      color: #000;
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }
    .ai-tutor-btn:hover { background: #00c8d4; }
    #lessonFrame {
      border: none;
      width: 100%;
      height: calc(100vh - 60px);
      display: block;
    }
  </style>
</head>
<body>
  <div class="launcher-header">
    <div class="launcher-title">📖 Peter Rabbit · Week 1</div>
    <button class="ai-tutor-btn" onclick="openAITutor()">🤖 AI 튜터 열기</button>
  </div>

  <iframe id="lessonFrame" src="./week01.html"></iframe>

  <script>
    document.getElementById('lessonFrame').onload = function() {
      try {
        var doc = this.contentDocument || this.contentWindow.document;
        // 내부 헤더(.topbar) 숨기기
        var topbar = doc.querySelector('.topbar');
        if (topbar) topbar.style.display = 'none';
        // 상단 여백 제거
        var container = doc.querySelector('.container');
        if (container) { container.style.marginTop = '0'; container.style.paddingTop = '8px'; }
      } catch(e) {
        console.log('iframe 접근 제한:', e);
      }
    };

    function openAITutor() {
      window.open(
        'https://chatgpt.com/g/g-69b4931ba6d4819194bb864aed20723b-yeongeo-tyuteo-cec-englishcamp-a',
        '_blank'
      );
    }
  </script>
</body>
</html>
