<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100vh; overflow:hidden; background:#000; }
    iframe {
      width:100%;
      height:100vh;
      border:none;
      display:block;
    }
    .guide-bar {
      position:fixed;
      top:0;
      width:100%;
      background:#00f2ff;
      color:#000;
      font-size:12px;
      text-align:center;
      padding:4px;
      z-index:9999;
      transition:opacity 0.5s;
    }
  </style>
</head>
<body>
  <div class="guide-bar" id="guideBar">💡 이 창을 왼쪽에, ChatGPT 창을 오른쪽에 배치하세요</div>
  <iframe src="./week01.html"></iframe>

  <script>
    // 페이지 로드 즉시 ChatGPT를 새 탭으로 열기
    window.open(
      'https://chatgpt.com/g/g-69b4931ba6d4819194bb864aed20723b-yeongeo-tyuteo-cec-englishcamp-a',
      '_blank'
    );

    // 3초 후 안내바 페이드아웃
    setTimeout(function() {
      var bar = document.getElementById('guideBar');
      bar.style.opacity = '0';
      setTimeout(function() { bar.style.display = 'none'; }, 500);
    }, 3000);
  </script>
</body>
</html>
