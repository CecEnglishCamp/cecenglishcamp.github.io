<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEC English Camp A</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;min-height:100vh;background:#000;color:#e0e0e0}

/* NAV */
.nav{background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border-bottom:1px solid #00f2ff22;padding:12px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo{width:36px;height:36px;border-radius:10px;border:2px solid #00f2ff66}
.nav-brand{font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:900;color:#fff}
.nav-badge{background:#00f2ff;color:#000;font-size:.65rem;font-weight:900;padding:2px 8px;border-radius:12px;margin-left:6px}
.nav-links{display:flex;gap:20px}
.nav-links a{color:#888;text-decoration:none;font-size:.82rem;font-weight:700;transition:color .2s}
.nav-links a:hover{color:#00f2ff}

/* HERO */
.hero{text-align:center;padding:48px 20px 40px}
.hero-robo{width:90px;height:90px;border-radius:50%;border:3px solid #00f2ff66;box-shadow:0 0 30px #00f2ff33;margin-bottom:16px}
.hero-title{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:#fff;margin-bottom:6px}
.hero-title span{color:#00f2ff}
.hero-sub{font-size:.88rem;color:#666;line-height:1.7}

/* CONTAINER */
.container{max-width:900px;margin:0 auto;padding:0 20px 60px}

/* SPEAKING BANNER */
.speaking-banner{display:block;text-decoration:none;background:linear-gradient(135deg,#00f2ff11,#00f2ff08);border:1px solid #00f2ff33;border-radius:16px;padding:28px 32px;margin-bottom:32px;transition:all .2s;text-align:center}
.speaking-banner:hover{border-color:#00f2ff88;box-shadow:0 0 30px #00f2ff22;transform:translateY(-2px)}
.speaking-icon{font-size:2rem;margin-bottom:8px}
.speaking-title{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:900;color:#00f2ff;margin-bottom:4px}
.speaking-desc{font-size:.85rem;color:#888}
.speaking-arrow{display:inline-block;margin-top:10px;color:#00f2ff;font-size:.8rem;font-weight:700}

/* GRADE GRID */
.grade-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:640px){.grade-grid{grid-template-columns:repeat(2,1fr)}}
.grade-card{display:block;text-decoration:none;border-radius:14px;overflow:hidden;transition:transform .2s,box-shadow .2s;border:1px solid #222;background:#0a0a0a}
.grade-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.5)}
.grade-card-top{height:8px}
.grade-card-body{padding:20px 16px;text-align:center}
.grade-num{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;margin-bottom:4px}
.grade-label{font-size:.7rem;font-weight:800;letter-spacing:2px;margin-bottom:8px}
.grade-book{font-size:.82rem;font-weight:700;color:#ccc;margin-bottom:4px}
.grade-sub{font-size:.72rem;color:#555}

.g3-top{background:#4CAF50}.g3-num{color:#4CAF50}.g3-label{color:#4CAF50}
.g3-hover:hover{border-color:#4CAF5066}
.g4-top{background:#2196F3}.g4-num{color:#2196F3}.g4-label{color:#2196F3}
.g4-hover:hover{border-color:#2196F366}
.g5-top{background:#FF9800}.g5-num{color:#FF9800}.g5-label{color:#FF9800}
.g5-hover:hover{border-color:#FF980066}
.g6-top{background:#9C27B0}.g6-num{color:#9C27B0}.g6-label{color:#9C27B0}
.g6-hover:hover{border-color:#9C27B066}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-left" href="#">
    <img class="nav-logo" src="https://pub-a418b5aad0bd4c3fb41cf7159403fc12.r2.dev/robo.gif" alt="Robo">
    <span class="nav-brand">CEC English Camp</span>
    <span class="nav-badge">CAMP A</span>
  </a>
  <div class="nav-links">
    <a href="../grammar-game.html">Grammar</a>
    <a href="../GrammarBaseCamp/">Base Camp</a>
    <a href="../">Home</a>
  </div>
</nav>

<div class="hero">

  <div class="hero-title">Camp <span>A</span></div>
  <div class="hero-sub">세계 명작으로 배우는 영어<br>그림 보고 말하기 + AI 튜터</div>
</div>

<div class="container">

  <a href="speaking/" class="speaking-banner">
    <div class="speaking-icon">🎤</div>
    <div class="speaking-title">Speaking 훈련</div>
    <div class="speaking-desc">그림으로 배우는 영어 말하기 · G3~G6 전체</div>
    <div class="speaking-arrow">시작하기 →</div>
  </a>

  <div class="grade-grid">
    <a href="lessons/grade3/" class="grade-card g3-hover">
      <div class="grade-card-top g3-top"></div>
      <div class="grade-card-body">
        <div class="grade-num g3-num">3</div>
        <div class="grade-label g3-label">GRADE</div>
        <div class="grade-book">Peter Rabbit</div>
        <div class="grade-sub">W1~W18</div>
      </div>
    </a>
    <a href="lessons/grade4/" class="grade-card g4-hover">
      <div class="grade-card-top g4-top"></div>
      <div class="grade-card-body">
        <div class="grade-num g4-num">4</div>
        <div class="grade-label g4-label">GRADE</div>
        <div class="grade-book">Wind in the Willows</div>
        <div class="grade-sub">W1~W18</div>
      </div>
    </a>
    <a href="lessons/grade5/" class="grade-card g5-hover">
      <div class="grade-card-top g5-top"></div>
      <div class="grade-card-body">
        <div class="grade-num g5-num">5</div>
        <div class="grade-label g5-label">GRADE</div>
        <div class="grade-book">Treasure Island</div>
        <div class="grade-sub">W1~W16</div>
      </div>
    </a>
    <a href="lessons/grade6/" class="grade-card g6-hover">
      <div class="grade-card-top g6-top"></div>
      <div class="grade-card-body">
        <div class="grade-num g6-num">6</div>
        <div class="grade-label g6-label">GRADE</div>
        <div class="grade-book">A Little Princess</div>
        <div class="grade-sub">W1~W16</div>
      </div>
    </a>
  </div>

</div>
</body>
