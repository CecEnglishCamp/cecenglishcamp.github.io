<script>
var canvas=document.getElementById("bgCanvas");var ctx=canvas.getContext("2d");var W,H,t=0;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}resize();window.addEventListener("resize",resize);
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.3;
  [{"a":0.04,"f":0.010,"s":0.015,"p":0},{"a":0.06,"f":0.007,"s":0.010,"p":2},{"a":0.03,"f":0.018,"s":0.022,"p":4}].forEach(function(w,wi){

  });

}draw();
