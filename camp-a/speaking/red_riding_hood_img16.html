  }else if(step.type==="en"){
    phEl.innerHTML='<span class="en" style="font-size:.9rem;line-height:1.5;">'+step.text+'</span>';
    phEl.classList.remove("silence-mode");miniWave.classList.add("playing");miniWave.classList.remove("silence");
  }else{
    var short=step.text.length>55?step.text.substring(0,55)+"…":step.text;
    phEl.innerHTML='<span style="font-size:.82rem;line-height:1.5;">'+short+'</span>';
    phEl.classList.remove("silence-mode");miniWave.classList.add("playing");miniWave.classList.remove("silence");
  }
  document.getElementById("chunkLabel").textContent="Step "+(idx+1)+" / "+SCRIPT.length;
  var activeSents=[];
  if(step.type==="en")SENTENCES.forEach(function(s,i){if(step.text.indexOf(s)!==-1)activeSents.push(i);});
  var doneSents=[];
  for(var j=0;j<idx;j++){
    if(SCRIPT[j].type==="en")SENTENCES.forEach(function(s,i){
      if(SCRIPT[j].text===s&&doneSents.indexOf(i)===-1&&activeSents.indexOf(i)===-1)doneSents.push(i);
    });
  }
  SENTENCES.forEach(function(_,i){
    var el=document.getElementById("s"+i);var dot=document.getElementById("dot"+i);
    var active=activeSents.indexOf(i)!==-1;var done=doneSents.indexOf(i)!==-1;
    el.classList.toggle("active",active);el.classList.toggle("done",done&&!active);
    el.querySelector(".check").textContent=(done&&!active)?"✅":"";
    dot.classList.toggle("active",active);dot.classList.toggle("done",done&&!active);
  });
  document.getElementById("dotsLabel").textContent=(doneSents.length+activeSents.length)+" / "+SENTENCES.length;
  if(!audio.paused)rafId=requestAnimationFrame(updateUI);
}

function setPlayBtn(p){
  document.getElementById("btnLabel").textContent=p?"Stop":"Play";
  document.getElementById("iconPlay").style.display=p?"none":"";
  document.getElementById("iconPause").style.display=p?"":"none";
  document.getElementById("btnPlay").classList.toggle("playing",p);
  isPlaying=p;
  if(!p){miniWave.classList.remove("playing","silence");isSilenceMode=false;}
}
function handlePlay(){
  if(audio.paused){audio.play();setPlayBtn(true);rafId=requestAnimationFrame(updateUI);}
  else{audio.pause();setPlayBtn(false);cancelAnimationFrame(rafId);}
}
function seekAudio(e){
  var rect=e.currentTarget.getBoundingClientRect();
  if(audio.duration)audio.currentTime=(e.clientX-rect.left)/rect.width*audio.duration;
}
audio.addEventListener("ended",function(){
  setPlayBtn(false);cancelAnimationFrame(rafId);
  document.getElementById("chunkLabel").textContent="Complete!";
  document.getElementById("progressBar").style.width="100%";
  document.getElementById("phaseDisplay").innerHTML="<b>Well done!</b> "+SENTENCES.length+"문장 완료! 정말 잘했어! 🎉";
  document.getElementById("phaseDisplay").classList.remove("silence-mode");
  SENTENCES.forEach(function(_,i){
    var el=document.getElementById("s"+i);el.classList.remove("active");el.classList.add("done");
    el.querySelector(".check").textContent="✅";
    var d=document.getElementById("dot"+i);d.classList.remove("active");d.classList.add("done");
  });
  document.getElementById("dotsLabel").textContent=SENTENCES.length+" / "+SENTENCES.length+" ✅";
  try{fetch(GPT_URL+"/api/lesson-progress",{method:"POST",headers:{"Content-Type":"application/json","X-Source":"cec-speaking"},body:JSON.stringify({student_name:studentName||"Student",lesson:LESSON_ID,sentences_done:SENTENCES.length,sentences_total:SENTENCES.length})});}catch(e){}
  setTimeout(function(){document.getElementById("nextSteps").classList.add("show");},2000);
});
function toggleMemo(){
  memoMode=!memoMode;
  document.getElementById("btnMemo").classList.toggle("on",memoMode);
  document.getElementById("btnMemo").textContent=memoMode?"Show Sentences":"Memorize Mode";
  document.querySelectorAll(".sentence").forEach(function(el){el.classList.toggle("hidden-text",memoMode);});
}
function goNext(){window.open(GPT_URL,"_blank");}
</script>
