function playSilence(dur){return new Promise(resolve=>{silenceTimer=setTimeout(()=>{silenceTimer=null;resolve();},dur*1000);});}
function updateUI(idx){const step=SCRIPT[idx];const total=SCRIPT.length;const pct=Math.round(((idx+1)/total)*100);document.getElementById("progressBar").style.width=pct+"%";document.getElementById("stepLabel").textContent=(idx+1)+" / "+total;document.getElementById("chunkLabel").textContent="Step "+(idx+1);let ph="";if(step.type==="silence")ph='<span style="color:#ffd700;font-size:.8rem">\uD83C\uDFA4 Your turn...</span>';else if(step.type==="en")ph='<span class="en" style="font-size:.82rem">'+step.text+'</span>';else ph='<span style="font-size:.82rem">'+step.text.substring(0,50)+(step.text.length>50?"...":"")+'</span>';document.getElementById("phaseDisplay").innerHTML=ph;}
function setPlayBtn(p){document.getElementById("btnLabel").textContent=p?"Pause":"Play";document.getElementById("iconPlay").style.display=p?"none":"";document.getElementById("iconPause").style.display=p?"":"none";document.getElementById("btnPlay").classList.toggle("playing",p);}
async function reportProgress(d,t){if(!studentName)return;try{await fetch(API_BASE+"/api/lesson-progress",{method:"POST",headers:{"Content-Type":"application/json",...NGROK_HEADERS},body:JSON.stringify({student_name:studentName,lesson:LESSON_ID,sentences_done:d,sentences_total:t})});}catch(e){}}
async function playSequence(){await ensureAudioReady();isPlaying=true;isPaused=false;setPlayBtn(true);for(let i=currentStep<0?0:currentStep;i<SCRIPT.length;i++){currentStep=i;updateUI(i);const c=audioCache[i];if(c.type==="silence")await playSilence(c.dur);else await playBlob(c.blob);if(isPaused){currentStep=i+1;return;}}isPlaying=false;currentStep=-1;setPlayBtn(false);document.getElementById("chunkLabel").textContent="Complete!";document.getElementById("progressBar").style.width="100%";document.getElementById("phaseDisplay").innerHTML="<b>Well done!</b> "+SENTENCES.length+" sentences!";for(let i=0;i<SENTENCES.length;i++){const el=document.getElementById("s"+i);if(!el)continue;el.classList.remove("active");el.classList.add("done");el.querySelector(".check").textContent="\u2705";}await reportProgress(SENTENCES.length,SENTENCES.length);setTimeout(()=>{document.getElementById("nextSteps").classList.add("show");},3000);}
function handlePlay(){if(!studentName){document.getElementById("nameModal").classList.remove("hidden");return;}unlockAudio();if(isPlaying&&!isPaused){isPaused=true;if(currentAudio)currentAudio.pause();if(silenceTimer){clearTimeout(silenceTimer);silenceTimer=null;}setPlayBtn(false);}else if(isPaused){isPaused=false;setPlayBtn(true);playSequence();}else{currentStep=-1;playSequence();}}
function toggleMemo(){memoMode=!memoMode;document.getElementById("btnMemo").classList.toggle("on",memoMode);document.querySelectorAll(".sentence").forEach(el=>el.classList.toggle("hidden-text",memoMode));}
function goNext(t){var s=SENTENCES.join("|");window.open("https://journey-bronzy-fruitily.ngrok-free.dev/static/auth-relay.html?name="+encodeURIComponent(studentName)+"&grade=4&camp=a&week=1&lesson=wind_willows_img5&sentences="+encodeURIComponent(s),"_blank");}
</script>
