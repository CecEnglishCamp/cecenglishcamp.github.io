<head>

<title>Wind in the Willows - Speaking 8</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Segoe UI',Tahoma,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 0}
.container{max-width:1200px;margin:0 auto;padding:16px;width:100%}
h1{text-align:center;color:#00ffff;font-size:1.4rem;margin-bottom:14px;text-shadow:0 0 10px rgba(0,255,255,.3)}
.main-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:start}
@media(max-width:768px){.main-grid{grid-template-columns:1fr}body{align-items:flex-start;padding-top:16px}}
.panel{background:#111;border-radius:12px;padding:16px;border:1px solid #222}.panel h2{color:#00ffff;font-size:1rem;margin-bottom:12px}
.img-panel img{width:100%;border-radius:10px;border:2px solid #00ffff33;box-shadow:0 0 20px rgba(0,255,255,.12)}
.sentence{display:flex;align-items:flex-start;gap:8px;padding:9px 10px;border-radius:8px;margin-bottom:4px;transition:all .3s;font-size:1rem;line-height:1.4}
.sentence .num{color:#555;font-weight:700;min-width:22px;flex-shrink:0}.sentence .text{color:#666;transition:all .3s}
.sentence.active{background:#00ffff0d;transform:scale(1.03)}.sentence.active .num{color:#00ffff}.sentence.active .text{color:#00ffff;font-size:1.08rem;font-weight:600}
.sentence.done .num{color:#4ade80}.sentence.done .text{color:#4ade80}.sentence.done .check{color:#4ade80;margin-left:auto;flex-shrink:0}
.sentence.hidden-text .text{color:transparent;background:#222;border-radius:4px;user-select:none}
.ctrl-panel{display:flex;flex-direction:column;gap:12px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:10px;border:none;cursor:pointer;font-size:.95rem;font-weight:600;transition:all .2s;width:100%}.btn:active{transform:scale(.97)}
.btn-play{background:linear-gradient(135deg,#00ffff,#0088aa);color:#0a0a0a}.btn-play:hover{box-shadow:0 0 20px rgba(0,255,255,.4)}.btn-play.playing{background:linear-gradient(135deg,#ff6b6b,#cc3333);color:#fff}
.btn-memo{background:#1a1a2e;color:#00ffff;border:1px solid #00ffff44}.btn-memo:hover{background:#00ffff15}.btn-memo.on{background:#00ffff22;border-color:#00ffff}
.progress-box{background:#0a0a1a;border-radius:10px;padding:12px;border:1px solid #222}
.progress-label{display:flex;justify-content:space-between;font-size:.85rem;color:#888;margin-bottom:6px}.progress-label span:first-child{color:#00ffff}
.progress-track{height:8px;background:#222;border-radius:4px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,#00ffff,#4ade80);border-radius:4px;transition:width .3s;width:0%}
.phase{text-align:center;padding:10px;border-radius:8px;background:#0a0a1a;border:1px solid #00ffff22;font-size:.88rem;color:#aaa;min-height:52px;display:flex;align-items:center;justify-content:center;line-height:1.4}.phase b{color:#00ffff}.phase .en{color:#ffd700}
.modal{position:fixed;inset:0;background:rgba(10,10,10,.95);display:flex;align-items:center;justify-content:center;z-index:200}.modal.hidden{display:none}
.modal-box{background:#151520;border:1px solid #00ffff44;border-radius:14px;padding:28px;max-width:380px;width:90%;text-align:center}
.modal-box h2{color:#00ffff;margin-bottom:8px;font-size:1.2rem}.modal-box p{color:#888;font-size:.85rem;margin-bottom:16px}
.modal-box input{width:100%;padding:12px;background:#0a0a0a;border:1px solid #333;border-radius:8px;color:#e0e0e0;font-size:1.1rem;text-align:center;margin-bottom:12px}.modal-box input:focus{outline:none;border-color:#00ffff}
.modal-box .btn-ok{background:#00ffff;color:#0a0a0a;padding:12px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:1rem;width:100%}
.next-steps{display:none;margin-top:12px;flex-direction:column;gap:8px}.next-steps.show{display:flex}
.btn-next{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 16px;border-radius:10px;border:none;cursor:pointer;font-size:.95rem;font-weight:600;width:100%;transition:all .2s}.btn-next:hover{transform:scale(1.02)}.btn-next:active{transform:scale(.97)}
.btn-ai{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
.student-badge{text-align:center;padding:8px;background:#0a0a1a;border:1px solid #00ffff22;border-radius:8px;font-size:.85rem;color:#888}.student-badge b{color:#00ffff}
</style>

var NGROK="https://journey-bronzy-fruitily.ngrok-free.dev";
var LESSON_ID="wind_willows_img8";
var studentName=new URLSearchParams(window.location.search).get("name")||"";
var memoMode=false;
if(studentName){document.getElementById("nameModal").classList.add("hidden");document.getElementById("studentBadge").innerHTML="Student: <b>"+studentName+"</b>";}
function saveName(){var v=document.getElementById("nameInput").value.trim();if(!v)return;studentName=v;document.getElementById("nameModal").classList.add("hidden");document.getElementById("studentBadge").innerHTML="Student: <b>"+studentName+"</b>";}
document.getElementById("nameInput").addEventListener("keydown",function(e){if(e.key==="Enter")saveName();});
var listEl=document.getElementById("sentenceList");
SENTENCES.forEach(function(s,i){var d=document.createElement("div");d.className="sentence";d.id="s"+i;d.innerHTML='<span class="num">'+(i+1)+'.</span><span class="text">'+s+'</span><span class="check"></span>';listEl.appendChild(d);});
var audio=document.getElementById("audio");
function fmt(s){var m=Math.floor(s/60);var sec=Math.floor(s%60);return m+":"+(sec<10?"0":"")+sec;}
function getCurrentStep(t){for(var i=SCRIPT.length-1;i>=0;i--){if(t>=SCRIPT[i].t)return i;}return 0;}
function updateUI(){var t=audio.currentTime;var dur=audio.duration||278.66;var pct=Math.min((t/dur)*100,100);document.getElementById("progressBar").style.width=pct+"%";document.getElementById("stepLabel").textContent=fmt(t)+" / "+fmt(dur);var idx=getCurrentStep(t);var step=SCRIPT[idx];var ph="";if(step.type==="silence")ph='<span style="color:#ffd700;font-size:.8rem">\uD83C\uDFA4 Your turn...</span>';else if(step.type==="en")ph='<span class="en" style="font-size:.85rem">'+step.text+'</span>';else ph='<span style="font-size:.82rem">'+step.text.substring(0,50)+(step.text.length>50?"...":"")+'</span>';document.getElementById("phaseDisplay").innerHTML=ph;document.getElementById("chunkLabel").textContent="Step "+(idx+1)+" / "+SCRIPT.length;for(var i=0;i<SENTENCES.length;i++){var el=document.getElementById("s"+i);var isActive=step.type==="en"&&step.text.indexOf(SENTENCES[i])!==-1;var isDone=false;for(var j=0;j<idx;j++){if(SCRIPT[j].type==="en"&&SCRIPT[j].text===SENTENCES[i])isDone=true;}el.classList.toggle("active",isActive);el.classList.toggle("done",isDone&&!isActive);el.querySelector(".check").textContent=isDone&&!isActive?"\u2705":"";}if(!audio.paused)requestAnimationFrame(updateUI);}
function setPlayBtn(p){document.getElementById("btnLabel").textContent=p?"Pause":"Play";document.getElementById("iconPlay").style.display=p?"none":"";document.getElementById("iconPause").style.display=p?"":"none";document.getElementById("btnPlay").classList.toggle("playing",p);}
function handlePlay(){if(!studentName){document.getElementById("nameModal").classList.remove("hidden");return;}if(audio.paused){audio.play();setPlayBtn(true);requestAnimationFrame(updateUI);}else{audio.pause();setPlayBtn(false);}}
audio.addEventListener("ended",function(){setPlayBtn(false);document.getElementById("chunkLabel").textContent="Complete!";document.getElementById("progressBar").style.width="100%";document.getElementById("phaseDisplay").innerHTML="<b>Well done!</b> "+SENTENCES.length+" sentences!";for(var i=0;i<SENTENCES.length;i++){var el=document.getElementById("s"+i);el.classList.remove("active");el.classList.add("done");el.querySelector(".check").textContent="\u2705";}if(studentName){try{fetch(NGROK+"/api/lesson-progress",{method:"POST",headers:{"Content-Type":"application/json","ngrok-skip-browser-warning":"true"},body:JSON.stringify({student_name:studentName,lesson:LESSON_ID,sentences_done:SENTENCES.length,sentences_total:SENTENCES.length})});}catch(e){}}setTimeout(function(){document.getElementById("nextSteps").classList.add("show");},3000);});
function toggleMemo(){memoMode=!memoMode;document.getElementById("btnMemo").classList.toggle("on",memoMode);document.querySelectorAll(".sentence").forEach(function(el){el.classList.toggle("hidden-text",memoMode);});}
function goNext(t){var s=SENTENCES.join("|");window.open("https://journey-bronzy-fruitily.ngrok-free.dev/static/auth-relay.html?name="+encodeURIComponent(studentName)+"&grade=4&camp=a&week=1&lesson=wind_willows_img8&sentences="+encodeURIComponent(s),"_blank");}
