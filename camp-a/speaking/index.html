<script>
var canvas=document.getElementById("bgCanvas");var ctx=canvas.getContext("2d");var W,H,t=0;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}resize();window.addEventListener("resize",resize);
var WAVES=[{"a":0.055,"f":0.012,"s":0.018,"p":0,"al":0.5,"lw":2},{"a":0.040,"f":0.018,"s":0.025,"p":2.1,"al":0.35,"lw":1.5},{"a":0.065,"f":0.008,"s":0.012,"p":4.3,"al":0.2,"lw":3},{"a":0.030,"f":0.025,"s":0.035,"p":1.0,"al":0.3,"lw":1},{"a":0.045,"f":0.015,"s":0.020,"p":3.5,"al":0.18,"lw":1.8}];
var ROWS=[0.18,0.32,0.48,0.62,0.78];
function draw(){
  ctx.clearRect(0,0,W,H);t+=0.25;
  var grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,"#020810");grad.addColorStop(0.5,"#030d1a");grad.addColorStop(1,"#020810");ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  WAVES.forEach(function(w,wi){
    var ry=ROWS[wi]*H;ctx.beginPath();ctx.moveTo(0,ry);
    for(var x=0;x<=W;x+=3){ctx.lineTo(x,ry+Math.sin(x*w.f+t*w.s+w.p)*H*w.a+Math.sin(x*w.f*1.7+t*w.s*0.6+w.p+1.2)*H*w.a*0.35);}
    var lg=ctx.createLinearGradient(0,0,W,0);lg.addColorStop(0,"rgba(0,212,255,0)");lg.addColorStop(0.2,"rgba(0,212,255,"+w.al+")");lg.addColorStop(0.8,"rgba(0,212,255,"+w.al+")");lg.addColorStop(1,"rgba(0,212,255,0)");
    ctx.strokeStyle=lg;ctx.lineWidth=w.lw;ctx.stroke();
  });
  requestAnimationFrame(draw);
}draw();
</script>
