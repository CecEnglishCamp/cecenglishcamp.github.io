<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaking 훈련 — CEC Camp A</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;min-height:100vh;background:#000;color:#e0e0e0}
.nav{background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border-bottom:1px solid #00f2ff22;padding:12px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo{width:36px;height:36px;border-radius:10px;border:2px solid #00f2ff66}
.nav-brand{font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:900;color:#fff}
.nav-badge{background:#00f2ff;color:#000;font-size:.65rem;font-weight:900;padding:2px 8px;border-radius:12px;margin-left:6px}
.nav a.back{color:#888;text-decoration:none;font-size:.82rem;font-weight:700;transition:color .2s}
.nav a.back:hover{color:#00f2ff}

.container{max-width:960px;margin:0 auto;padding:40px 20px 60px}
h1{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;color:#00f2ff;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;color:#666;font-size:.88rem;margin-bottom:36px}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
@media(max-width:560px){.grid{grid-template-columns:1fr}}

.card{display:block;text-decoration:none;border-radius:16px;overflow:hidden;transition:transform .2s,box-shadow .2s;border:1px solid #222;background:#0a0a0a}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.5)}
.card-img{width:100%;height:180px;object-fit:cover;display:block}
.card-body{padding:16px 20px}
.card-grade{font-size:.7rem;font-weight:800;letter-spacing:2px;margin-bottom:4px}
.card-title{font-size:1.05rem;font-weight:900;color:#fff;margin-bottom:4px}
.card-sub{font-size:.78rem;color:#666}

.g3{color:#4CAF50}.g3-border:hover{border-color:#4CAF5066}
.g4{color:#2196F3}.g4-border:hover{border-color:#2196F366}
.g5{color:#FF9800}.g5-border:hover{border-color:#FF980066}
.g6{color:#9C27B0}.g6-border:hover{border-color:#9C27B066}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-left" href="/camp-a/">
    <img class="nav-logo" src="https://pub-a418b5aad0bd4c3fb41cf7159403fc12.r2.dev/robo.gif" alt="Robo">
    <span class="nav-brand">Speaking 훈련</span>
    <span class="nav-badge">🎤</span>
  </a>
  <a href="/camp-a/" class="back">&larr; Camp A</a>
</nav>

<div class="container">
  <h1>Speaking 훈련</h1>
  <div class="subtitle">그림으로 배우는 영어 말하기</div>

  <div class="grid">
    <a href="peter_rabbit_index.html" class="card g3-border">
      <img class="card-img" src="https://pub-a418b5aad0bd4c3fb41cf7159403fc12.r2.dev/camp-a/speaking/peter_rabbit_img1.png" alt="Peter Rabbit">
      <div class="card-body">
        <div class="card-grade g3">GRADE 3</div>
        <div class="card-title">Peter Rabbit</div>
        <div class="card-sub">9장 그림 · 52문장</div>
      </div>
    </a>
    <a href="wind_willows_index.html" class="card g4-border">
      <img class="card-img" src="https://pub-a418b5aad0bd4c3fb41cf7159403fc12.r2.dev/camp-a/speaking/wind_willows_img1.png" alt="Wind in the Willows">
      <div class="card-body">
        <div class="card-grade g4">GRADE 4</div>
        <div class="card-title">Wind in the Willows</div>
        <div class="card-sub">8장 그림 · 47문장</div>
      </div>
    </a>
    <a href="treasure_island_index.html" class="card g5-border">
      <img class="card-img" src="https://pub-a418b5aad0bd4c3fb41cf7159403fc12.r2.dev/camp-a/speaking/treasure_island_img1.png" alt="Treasure Island">
      <div class="card-body">
        <div class="card-grade g5">GRADE 5</div>
        <div class="card-title">Treasure Island</div>
        <div class="card-sub">8장 그림 · 47문장</div>
      </div>
    </a>
    <a href="little_princess_index.html" class="card g6-border">
      <img class="card-img" src="https://pub-a418b5aad0bd4c3fb41cf7159403fc12.r2.dev/camp-a/speaking/little_princess_img1.png" alt="A Little Princess">
      <div class="card-body">
        <div class="card-grade g6">GRADE 6</div>
        <div class="card-title">A Little Princess</div>
        <div class="card-sub">8장 그림 · 45문장</div>
      </div>
    </a>
  </div>
</div>
</body>
</html>
