<title>Peter Rabbit - Picture Speaking 9</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Segoe UI',Tahoma,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 0}
.container{max-width:1200px;margin:0 auto;padding:16px;width:100%}
h1{text-align:center;color:#00ffff;font-size:1.4rem;margin-bottom:14px;text-shadow:0 0 10px rgba(0,255,255,.3)}
.main-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:start}
@media(max-width:768px){.main-grid{grid-template-columns:1fr}body{align-items:flex-start;padding-top:16px}}
.panel{background:#111;border-radius:12px;padding:16px;border:1px solid #222}
.panel h2{color:#00ffff;font-size:1rem;margin-bottom:12px}
.img-panel img{width:100%;border-radius:10px;border:2px solid #00ffff33;box-shadow:0 0 20px rgba(0,255,255,.12)}

.sentence .num{color:#555;font-weight:700;min-width:22px;flex-shrink:0}

.sentence.done .num{color:#4ade80}.sentence.done .text{color:#4ade80}.sentence.done .check{color:#4ade80;margin-left:auto;flex-shrink:0}

.ctrl-panel{display:flex;flex-direction:column;gap:12px}

.progress-track{height:8px;background:#222;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#00ffff,#4ade80);border-radius:4px;transition:width .3s;width:0%}

.modal-box{background:#151520;border:1px solid #00ffff44;border-radius:14px;padding:28px;max-width:380px;width:90%;text-align:center}
.modal-box h2{color:#00ffff;margin-bottom:8px;font-size:1.2rem}.modal-box p{color:#888;font-size:.85rem;margin-bottom:16px}
.modal-box input{width:100%;padding:12px;background:#0a0a0a;border:1px solid #333;border-radius:8px;color:#e0e0e0;font-size:1.1rem;text-align:center;margin-bottom:12px}.modal-box input:focus{outline:none;border-color:#00ffff}
.modal-box .btn-ok{background:#00ffff;color:#0a0a0a;padding:12px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:1rem;width:100%}
.next-steps{display:none;margin-top:12px;flex-direction:column;gap:8px}.next-steps.show{display:flex}
.btn-next{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 16px;border-radius:10px;border:none;cursor:pointer;font-size:.95rem;font-weight:600;width:100%;transition:all .2s}.btn-next:hover{transform:scale(1.02)}.btn-next:active{transform:scale(.97)}
.btn-ai{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
.student-badge{text-align:center;padding:8px;background:#0a0a1a;border:1px solid #00ffff22;border-radius:8px;font-size:.85rem;color:#888}.student-badge b{color:#00ffff}
.time-display{text-align:center;font-size:.82rem;color:#666;margin-top:4px;font-variant-numeric:tabular-nums}

"dur": 5, "t": 112.0}, {"type": "en", "text": "His mother is next to him. She has a white apron.", "t": 116.0}, {"type": "kr", "text": "잘하고 있어!", "t": 119.9}, {"type": "kr", "text": "다섯 번째 문장이야. 엄마가 뭘 주고 있어? 차 한 잔이야! gives가 준다는 뜻이야.", "t": 121.6}, {"type": "en", "text": "She gives him a cup of tea.", "t": 129.5}, {"type": "kr", "text": "따라해봐!", "t": 132.2}, {"type": "silence", "dur": 3, "t": 133.6}, {"type": "en", "text": "She gives him a cup of tea.", "t": 136.1}, {"type": "kr", "text": "잘했어!", "t": 138.8}, {"type": "kr", "text": "여섯 번째 문장이야. 그 차가 어때? 따뜻하고 기분 좋지! soothing이 마음을 달래준다는 뜻이야.", "t": 140.2}, {"type": "en", "text": "The tea is warm and soothing.", "t": 149.3}, {"type": "kr", "text": "따라해봐!", "t": 151.7}, {"type": "silence", "dur": 3, "t": 153.2}, {"type": "en", "text": "The tea is warm and soothing.", "t": 155.6}, {"type": "kr", "text": "5번 6번 연속으로!", "t": 158.0}, {"type": "en", "text": "She gives him a cup of tea. The tea is warm and soothing.", "t": 160.3}, {"type": "kr", "text": "혼자 말해봐! 5초!", "t": 164.7}, {"type": "silence", "dur": 5, "t": 167.0}, {"type": "en", "text": "She gives him a cup of tea. The tea is warm and soothing.", "t": 171.1}, {"type": "kr", "text": "잘하고 있어!", "t": 175.5}, {"type": "kr", "text": "일곱 번째 문장이야. 피터가 집에서 어떤 느낌이야? 안전하고 편안하지! safe가 안전하다는 뜻이야.", "t": 177.2}, {"type": "en", "text": "Peter feels safe at home.", "t": 186.2}, {"type": "kr", "text": "따라해봐!", "t": 188.3}, {"type": "silence", "dur": 3, "t": 189.7}, {"type": "en", "text": "Peter feels safe at home.", "t": 192.2}, {"type": "kr", "text": "잘했어!", "t": 194.3}, {"type": "kr", "text": "마지막 여덟 번째 문장이야! 피터가 이번 모험으로 뭘 배웠을까? 다시는 그 밭에 안 가겠다고 다짐했겠지!", "t": 195.8}, {"type": "en", "text": "He will not go to the garden again.", "t": 205.0}, {"type": "kr", "text": "따라해봐!", "t": 208.0}, {"type": "silence", "dur": 3, "t": 209.4}, {"type": "en", "text": "He will not go to the garden again.", "t": 211.9}, {"type": "kr", "text": "7번 8번 연속으로!", "t": 214.9}, {"type": "en", "text": "Peter feels safe at home. He will not go to the garden again.", "t": 217.2}, {"type": "kr", "text": "혼자 말해봐! 6초!", "t": 221.6}, {"type": "silence", "dur": 6, "t": 223.9}, {"type": "en", "text": "Peter feels safe at home. He will not go to the garden again.", "t": 228.8}, {"type": "kr", "text": "이제 8문장 전체! 마지막이야! 할 수 있어!", "t": 233.2}, {"type": "en", "text": "Peter is in bed. He is tired and sick. His mother is next to him. She has a white apron. She gives him a cup of tea. The tea is warm and soothing. Peter feels safe at home. He will not go to the garden again.", "t": 237.5}, {"type": "kr", "text": "혼자 말해봐! 16초!", "t": 251.6}, {"type": "silence", "dur": 16, "t": 254.0}, {"type": "en", "text": "Peter is in bed. He is tired and sick. His mother is next to him. She has a white apron. She gives him a cup of tea. The tea is warm and soothing. Peter feels safe at home. He will not go to the garden again.", "t": 267.0}, {"type": "kr", "text": "와! 대단해! 8문장 전부 외웠어! 피터 래빗 이야기 전체를 영어로 말할 수 있게 됐어! 정말 자랑스러워! 이제 AI 선생님과 함께 연습해볼까?", "t": 281.1}];
var NGROK="https://journey-bronzy-fruitily.ngrok-free.dev";
var LESSON_ID="peter_rabbit_img9";
var studentName=new URLSearchParams(window.location.search).get("name")||"Student";
var memoMode=false;




var listEl=document.getElementById("sentenceList");
SENTENCES.forEach(function(s,i){var d=document.createElement("div");d.className="sentence";d.id="s"+i;d.innerHTML='<span class="num">'+(i+1)+'.</span><span class="text">'+s+'</span><span class="check"></span>';listEl.appendChild(d);});

var audio=document.getElementById("audio");

function fmt(s){var m=Math.floor(s/60);var sec=Math.floor(s%60);return m+":"+(sec<10?"0":"")+sec;}

function getCurrentStep(t){for(var i=SCRIPT.length-1;i>=0;i--){if(t>=SCRIPT[i].t)return i;}return 0;}

function updateUI(){
  var t=audio.currentTime;
  var dur=audio.duration||293.58;
  var pct=Math.min((t/dur)*100,100);
  document.getElementById("progressBar").style.width=pct+"%";
  document.getElementById("stepLabel").textContent=fmt(t)+" / "+fmt(dur);

  var idx=getCurrentStep(t);
  var step=SCRIPT[idx];
  var ph="";
  if(step.type==="silence")ph='<span style="color:#ffd700;font-size:.8rem">\uD83C\uDFA4 Your turn...</span>';
  else if(step.type==="en")ph='<span class="en" style="font-size:.85rem">'+step.text+'</span>';
  else ph='<span style="font-size:.82rem">'+step.text.substring(0,50)+(step.text.length>50?"...":"")+'</span>';
  document.getElementById("phaseDisplay").innerHTML=ph;
  document.getElementById("chunkLabel").textContent="Step "+(idx+1)+" / "+SCRIPT.length;

  // Highlight sentences that are mentioned in current EN text
  for(var i=0;i<SENTENCES.length;i++){
    var el=document.getElementById("s"+i);
    var isActive=step.type==="en"&&step.text.indexOf(SENTENCES[i])!==-1;
    var isDone=false;
    // Check if this sentence appeared in a previous completed section
    for(var j=0;j<idx;j++){
      if(SCRIPT[j].type==="en"&&SCRIPT[j].text===SENTENCES[i])isDone=true;
    }
    el.classList.toggle("active",isActive);
    el.classList.toggle("done",isDone&&!isActive);
    el.querySelector(".check").textContent=isDone&&!isActive?"\u2705":"";
  }
  if(!audio.paused)requestAnimationFrame(updateUI);
}

function setPlayBtn(p){document.getElementById("btnLabel").textContent=p?"Pause":"Play";document.getElementById("iconPlay").style.display=p?"none":"";document.getElementById("iconPause").style.display=p?"":"none";document.getElementById("btnPlay").classList.toggle("playing",p);}

function handlePlay(){
  
  if(audio.paused){audio.play();setPlayBtn(true);requestAnimationFrame(updateUI);}
  else{audio.pause();setPlayBtn(false);}
}

audio.addEventListener("ended",function(){
  setPlayBtn(false);
  document.getElementById("chunkLabel").textContent="Complete!";
  document.getElementById("progressBar").style.width="100%";
  document.getElementById("phaseDisplay").innerHTML="<b>Well done!</b> "+SENTENCES.length+" sentences!";
  for(var i=0;i<SENTENCES.length;i++){var el=document.getElementById("s"+i);el.classList.remove("active");el.classList.add("done");el.querySelector(".check").textContent="\u2705";}
  // Report progress
  if(studentName){try{fetch(NGROK+"/api/lesson-progress",{method:"POST",headers:{"Content-Type":"application/json","ngrok-skip-browser-warning":"true"},body:JSON.stringify({student_name:studentName,lesson:LESSON_ID,sentences_done:SENTENCES.length,sentences_total:SENTENCES.length})});}catch(e){}}
  setTimeout(function(){document.getElementById("nextSteps").classList.add("show");},3000);
});

function toggleMemo(){memoMode=!memoMode;document.getElementById("btnMemo").classList.toggle("on",memoMode);document.querySelectorAll(".sentence").forEach(function(el){el.classList.toggle("hidden-text",memoMode);});}

function goNext(t){var s=SENTENCES.join("|");window.open("https://journey-bronzy-fruitily.ngrok-free.dev/static/auth-relay.html?name="+encodeURIComponent(studentName)+"&grade=3&camp=a&week=1&lesson=peter_rabbit_img9&sentences="+encodeURIComponent(s),"_blank");}
</script>
