<title>Peter Rabbit - Picture Speaking 5</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito','Noto Sans KR',sans-serif;background:#020810;min-height:100vh;overflow-x:hidden}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.55}
.bg-overlay{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse at center,rgba(2,8,16,0.45) 0%,rgba(2,8,16,0.75) 100%);pointer-events:none}
.page{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px}
h1{text-align:center;color:#00d4ff;font-size:1.5rem;font-weight:900;margin-bottom:22px;text-shadow:0 0 30px rgba(0,212,255,0.7),0 0 60px rgba(0,212,255,0.3);letter-spacing:-0.3px}
.main-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;max-width:1120px;width:100%}
@media(max-width:768px){.main-grid{grid-template-columns:1fr}}
.panel{background:rgba(10,16,32,0.72);border-radius:18px;padding:18px;border:1px solid rgba(0,212,255,0.18);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 8px 40px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.04)}
.img-panel img{width:100%;border-radius:12px;border:2px solid rgba(0,212,255,0.25);box-shadow:0 0 30px rgba(0,212,255,0.15);display:block}
.panel h2{color:#00d4ff;font-size:.9rem;font-weight:800;margin-bottom:14px;letter-spacing:1.2px;text-transform:uppercase}
.sentence{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:10px;margin-bottom:6px;transition:all .35s cubic-bezier(.4,0,.2,1);border:1.5px solid transparent}
.sentence .num{color:#2a3a4a;font-weight:800;min-width:22px;flex-shrink:0}
.sentence .text{color:#3a4a5a;transition:all .3s;font-size:.97rem;line-height:1.5}
.sentence .check{margin-left:auto;flex-shrink:0}
.sentence.active{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.4);transform:scale(1.02);box-shadow:0 0 20px rgba(0,212,255,0.15)}
.sentence.active .num{color:#00d4ff}.sentence.active .text{color:#e8f8ff;font-weight:700}
.sentence.done .num{color:#4ade80}.sentence.done .text{color:rgba(74,222,128,0.55)}
.sentence.hidden-text .text{color:transparent;background:rgba(0,212,255,0.08);border-radius:4px;user-select:none}

.ctrl-panel{display:flex;flex-direction:column;gap:12px}

.btn-play:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,212,255,0.55)}
.btn-play:active{transform:scale(.97)}
.btn-play.playing{background:linear-gradient(135deg,#ff4d6d,#cc2244);box-shadow:0 4px 24px rgba(255,77,109,0.45)}
.mini-wave{background:rgba(0,8,20,0.6);border:1px solid rgba(0,212,255,0.15);border-radius:12px;height:72px;display:flex;align-items:center;justify-content:center;gap:0;padding:0 12px;overflow:hidden;position:relative}
.mw-bar{width:2.5px;border-radius:99px;background:rgba(0,212,255,0.15);margin:0 1.2px;height:3px;transform-origin:center;transition:background .3s}
.mini-wave.playing .mw-bar{background:#00d4ff;animation:mwUp var(--dur) ease-in-out infinite alternate;animation-delay:var(--delay)}
.mini-wave.silence .mw-bar{background:#ffd166;animation:mwUp var(--dur) ease-in-out infinite alternate;animation-delay:var(--delay)}
@keyframes mwUp{0%{height:3px}100%{height:var(--h)}}

.progress-fill{height:100%;background:linear-gradient(90deg,#00d4ff,#4ade80);border-radius:99px;transition:width .3s linear;width:0%}
.phase{text-align:center;padding:12px 14px;border-radius:10px;background:rgba(0,8,20,0.5);border:1px solid rgba(0,212,255,0.12);font-size:.86rem;color:#556;min-height:58px;display:flex;align-items:center;justify-content:center;line-height:1.5;transition:border-color .3s}

.sent-dots{display:flex;align-items:center;justify-content:space-between}
.dots-wrap{display:flex;gap:7px}
.sdot{width:9px;height:9px;border-radius:50%;background:rgba(0,212,255,0.1);transition:all .3s}
.sdot.active{background:#00d4ff;box-shadow:0 0 10px rgba(0,212,255,0.7)}
.sdot.done{background:#4ade80;box-shadow:0 0 8px rgba(74,222,128,0.5)}
.dots-label{font-size:.78rem;color:#445;font-weight:700}
.next-steps{display:none;flex-direction:column;gap:8px}.next-steps.show{display:flex}
.btn-next{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:10px;border:none;cursor:pointer;font-size:.9rem;font-weight:700;width:100%;transition:all .2s;font-family:'Nunito',sans-serif}
.btn-next:hover{transform:scale(1.02)}
.btn-ai{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
</style>

var canvas=document.getElementById("bgCanvas");
var ctx=canvas.getContext("2d");
var W,H;
function resizeCanvas(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resizeCanvas();window.addEventListener("resize",resizeCanvas);
var WAVES=[
  {amp:0.055,freq:0.012,speed:0.018,phase:0,alpha:0.6,lineW:2.5},
  {amp:0.040,freq:0.018,speed:0.025,phase:2.1,alpha:0.4,lineW:1.8},
  {amp:0.070,freq:0.008,speed:0.012,phase:4.3,alpha:0.25,lineW:3.5},
  {amp:0.030,freq:0.025,speed:0.035,phase:1.0,alpha:0.35,lineW:1.2},
  {amp:0.050,freq:0.015,speed:0.020,phase:3.5,alpha:0.2,lineW:2.0},
  {amp:0.025,freq:0.030,speed:0.042,phase:5.8,alpha:0.3,lineW:1.0}
];
var ROWS=[0.15,0.28,0.42,0.57,0.71,0.85];
function drawBg(){
  ctx.clearRect(0,0,W,H);
  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,"#020810");grad.addColorStop(0.5,"#030d1a");grad.addColorStop(1,"#020810");
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  if(isPlaying){
    var gx=ctx.createRadialGradient(W*0.5,H*0.5,0,W*0.5,H*0.5,W*0.7);
    var col=isSilenceMode?"255,209,102":"0,180,220";
    gx.addColorStop(0,"rgba("+col+",0.04)");gx.addColorStop(1,"rgba("+col+",0)");

  }
  animTime+=isPlaying?1:0.25;
  var baseCol=isSilenceMode?"255,209,102":"0,212,255";
  var ampScale=isPlaying?1.0:0.25;
  WAVES.forEach(function(w,wi){
    var rowY=ROWS[wi%ROWS.length]*H;
    ctx.beginPath();ctx.moveTo(0,rowY);
    for(var x=0;x<=W;x+=3){
      var y=rowY
        +Math.sin(x*w.freq+animTime*w.speed+w.phase)*H*w.amp*ampScale
        +Math.sin(x*w.freq*1.7+animTime*w.speed*0.6+w.phase+1.2)*H*w.amp*0.4*ampScale
        +Math.sin(x*w.freq*0.5+animTime*w.speed*1.3+w.phase+2.5)*H*w.amp*0.25*ampScale;
      ctx.lineTo(x,y);
    }
    var lg=ctx.createLinearGradient(0,0,W,0);
    lg.addColorStop(0,"rgba("+baseCol+",0)");lg.addColorStop(0.2,"rgba("+baseCol+","+w.alpha+")");
    lg.addColorStop(0.5,"rgba("+baseCol+","+(w.alpha*1.4)+")");lg.addColorStop(0.8,"rgba("+baseCol+","+w.alpha+")");
    lg.addColorStop(1,"rgba("+baseCol+",0)");
    ctx.strokeStyle=lg;ctx.lineWidth=w.lineW;
    ctx.shadowBlur=isPlaying?12:0;ctx.shadowColor="rgba("+baseCol+",0.5)";
    ctx.stroke();ctx.shadowBlur=0;

  }
  requestAnimationFrame(drawBg);
}

function getCurrentStep(t){for(var i=SCRIPT.length-1;i>=0;i--){if(t>=SCRIPT[i].t)return i;}return 0;}

function updateUI(){
  var t=audio.currentTime;var dur=audio.duration||1;
  document.getElementById("progressBar").style.width=Math.min(t/dur*100,100)+"%";
  document.getElementById("stepLabel").textContent=fmt(t)+" / "+fmt(dur);
  var idx=getCurrentStep(t);var step=SCRIPT[idx];
  var silence=step.type==="silence";

  isSilenceMode=silence;
  if(silence){
    phEl.innerHTML='<span style="color:#ffd166;font-weight:800;font-size:.95rem;">🎤 Your turn! '+(step.dur||3)+'초 안에 말해봐!</span>';

  }else{
    var short=step.text.length>55?step.text.substring(0,55)+"…":step.text;

  }
  document.getElementById("chunkLabel").textContent="Step "+(idx+1)+" / "+SCRIPT.length;
  var activeSents=[];
  if(step.type==="en")SENTENCES.forEach(function(s,i){if(step.text.indexOf(s)!==-1)activeSents.push(i);});
  var doneSents=[];
  for(var j=0;j<idx;j++){
    if(SCRIPT[j].type==="en")SENTENCES.forEach(function(s,i){
      if(SCRIPT[j].text===s&&doneSents.indexOf(i)===-1&&activeSents.indexOf(i)===-1)doneSents.push(i);
    });
  }
  SENTENCES.forEach(function(_,i){
    var el=document.getElementById("s"+i);var dot=document.getElementById("dot"+i);
    var active=activeSents.indexOf(i)!==-1;var done=doneSents.indexOf(i)!==-1;
    el.classList.toggle("active",active);el.classList.toggle("done",done&&!active);
    el.querySelector(".check").textContent=(done&&!active)?"✅":"";
    dot.classList.toggle("active",active);dot.classList.toggle("done",done&&!active);
  });
  document.getElementById("dotsLabel").textContent=(doneSents.length+activeSents.length)+" / "+SENTENCES.length;
  if(!audio.paused)rafId=requestAnimationFrame(updateUI);
}

function setPlayBtn(p){
  document.getElementById("btnLabel").textContent=p?"Stop":"Play";
  document.getElementById("iconPlay").style.display=p?"none":"";
  document.getElementById("iconPause").style.display=p?"":"none";
  document.getElementById("btnPlay").classList.toggle("playing",p);
  isPlaying=p;
  if(!p){miniWave.classList.remove("playing","silence");isSilenceMode=false;}
}
function handlePlay(){
  if(audio.paused){audio.play();setPlayBtn(true);rafId=requestAnimationFrame(updateUI);}
  else{audio.pause();setPlayBtn(false);cancelAnimationFrame(rafId);}
}
function seekAudio(e){
  var rect=e.currentTarget.getBoundingClientRect();
  if(audio.duration)audio.currentTime=(e.clientX-rect.left)/rect.width*audio.duration;
}
audio.addEventListener("ended",function(){
  setPlayBtn(false);cancelAnimationFrame(rafId);
  document.getElementById("chunkLabel").textContent="Complete!";
  document.getElementById("progressBar").style.width="100%";
  document.getElementById("phaseDisplay").innerHTML="<b>Well done!</b> "+SENTENCES.length+"문장 완료! 정말 잘했어! 🎉";
  document.getElementById("phaseDisplay").classList.remove("silence-mode");
  SENTENCES.forEach(function(_,i){
    var el=document.getElementById("s"+i);el.classList.remove("active");el.classList.add("done");
    el.querySelector(".check").textContent="✅";
    var d=document.getElementById("dot"+i);d.classList.remove("active");d.classList.add("done");
  });
  document.getElementById("dotsLabel").textContent=SENTENCES.length+" / "+SENTENCES.length+" ✅";
  try{fetch(GPT_URL+"/api/lesson-progress",{method:"POST",headers:{"Content-Type":"application/json","X-Source":"cec-speaking"},body:JSON.stringify({student_name:studentName||"Student",lesson:LESSON_ID,sentences_done:SENTENCES.length,sentences_total:SENTENCES.length})});}catch(e){}
  setTimeout(function(){document.getElementById("nextSteps").classList.add("show");},2000);
});
function toggleMemo(){
  memoMode=!memoMode;
  document.getElementById("btnMemo").classList.toggle("on",memoMode);
  document.getElementById("btnMemo").textContent=memoMode?"Show Sentences":"Memorize Mode";
  document.querySelectorAll(".sentence").forEach(function(el){el.classList.toggle("hidden-text",memoMode);});
}
function goNext(){window.open(GPT_URL,"_blank");}
</script>
