<title>Wind in the Willows - Picture Speaking</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Segoe UI',Tahoma,sans-serif;min-height:100vh;padding:24px 16px}
.container{max-width:960px;margin:0 auto}
h1{text-align:center;color:#00ffff;font-size:1.5rem;margin-bottom:8px;text-shadow:0 0 10px rgba(0,255,255,.3)}
.subtitle{text-align:center;color:#888;font-size:.85rem;margin-bottom:28px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:640px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{display:block;background:#111;border:1px solid #222;border-radius:14px;overflow:hidden;text-decoration:none;transition:transform .2s,border-color .2s,box-shadow .2s}
.card:hover{transform:scale(1.04);border-color:#00ffff44;box-shadow:0 8px 30px rgba(0,255,255,.1)}
.card img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block}
.card-body{padding:10px 12px 12px}
.card-num{color:#00ffff;font-weight:700;font-size:.9rem}
.card-sub{color:#666;font-size:.78rem;margin-top:2px}
.back{display:inline-block;margin-bottom:20px;color:#888;text-decoration:none;font-size:.85rem;transition:color .2s}
.back:hover{color:#00ffff}
.total{text-align:center;margin-top:20px;color:#555;font-size:.8rem}
</style>
</head>
