<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEC English Camp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
  }

  /* ─── NAVBAR ─────────────────────────────────── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 36px;
    height: 68px;
    background: #000;
    border-bottom: 1px solid rgba(0,255,255,0.13);
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
  }

  /* Logo left */
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }
  .nav-logo img {
    width: 38px; height: 38px;
    object-fit: contain;
    border-radius: 8px;
  }
  .nav-logo-text {
    font-family: 'Outfit', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    color: #fff;
    white-space: nowrap;
  }

  /* Center links */
  .nav-links {
    display: flex;
    align-items: center;
    gap: 6px;
    list-style: none;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .nav-sep {
    color: #00ffff;
    font-size: 0.38rem;
    opacity: 0.4;
    padding: 0 2px;
    flex-shrink: 0;
  }

  .nav-links a {
    font-family: 'Outfit', sans-serif;
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 5px 8px;
    white-space: nowrap;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: #00ffff; }

  /* Register button right */
  .nav-register {
    flex-shrink: 0;
  }
  .nav-register a {
    font-family: 'Outfit', sans-serif;
    background: #00ffff;
    color: #000;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    padding: 9px 24px;
    border-radius: 50px;
    transition: opacity 0.2s;
    white-space: nowrap;
    display: block;
  }
  .nav-register a:hover { opacity: 0.82; }

  /* ─── HERO ───────────────────────────────────── */
  #hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 0 20px;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-style: normal;
    font-size: clamp(2.6rem, 6.5vw, 5.2rem);
    color: #fff;
    line-height: 1.0;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }

  .hero-sub {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-style: italic;
    font-size: clamp(1.2rem, 2.8vw, 2.1rem);
    color: #00f2ff;
    line-height: 1.2;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>

<nav>
  <!-- Logo -->
  <a href="/cec-edu/" class="nav-logo">
    <img src="assets/robo.png" alt="Robo" onerror="this.style.display='none'">
    <span class="nav-logo-text">CEC English Camp</span>
  </a>

  <!-- Center nav -->
  <ul class="nav-links">
    <li><a href="about/">About</a></li>
    <li class="nav-sep">•</li>
    <li><a href="camp-a/">Camp A</a></li>
    <li class="nav-sep">•</li>
    <li><a href="camp-b/">Camp B</a></li>
    <li class="nav-sep">•</li>
    <li><a href="camp-c/">Camp C</a></li>
    <li class="nav-sep">•</li>
    <li><a href="grammar-base/">Grammar Base Camp</a></li>
    <li class="nav-sep">•</li>
    <li><a href="games/">Game</a></li>
    <li class="nav-sep">•</li>
    <li><a href="#">Programs</a></li>
    <li class="nav-sep">•</li>
    <li><a href="#">AI Tools</a></li>
  </ul>

  <!-- Register -->
  <div class="nav-register">
    <a href="register/">Register</a>
  </div>
</nav>

<!-- ─── HERO ───────────────────────────────────── -->
<section id="hero">
  <h1 class="hero-title">CEC English Camp</h1>
  <p class="hero-sub">Master English with Literature &amp; AI</p>
</section>

</body>
</html>
