<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEC English Camp — 수강 등록</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--surface:#0C1428;--surface2:#111E38;--gold:#C9A84C;--gold2:#E8C96A;--gold3:#F5E0A0;--blue:#2A5298;--text:#E8DFC8;--muted:#5A6A80;--muted2:#8A9AB0;--border:rgba(201,168,76,0.12);--border2:rgba(201,168,76,0.28);--green:#34D399;--red:#F87171}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;height:58px;background:#000;display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:100;border-bottom:1px solid var(--border)}
.logo{font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;color:var(--gold2);text-decoration:none;display:flex;align-items:center;gap:12px}
.logo-robo{width:32px;height:32px;border-radius:8px;overflow:hidden;border:1px solid var(--border2)}
.logo-robo img{width:100%;height:100%;object-fit:cover}
.logo-badge{background:linear-gradient(135deg,#1A3A70,#2A5298);border:1px solid rgba(201,168,76,0.3);color:var(--gold2);font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:2px}
.nav-links{display:flex;gap:20px}
.nav-link{font-size:.9rem;color:#fff;text-decoration:none;font-weight:600}
.nav-link:hover{color:var(--gold2)}

.main{max-width:560px;margin:0 auto;padding:90px 20px 60px}
.hero{text-align:center;margin-bottom:40px}
.hero-rule{width:120px;height:1px;margin:0 auto 16px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:700;color:#fff;margin-bottom:8px}
.hero h1 em{font-style:italic;color:var(--gold2)}
.hero p{font-size:14px;color:var(--muted2);line-height:1.7}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.card-title{font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:8px}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--gold);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.form-input{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--gold)}
.form-input::placeholder{color:var(--muted)}

.grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grade-btn{padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted2);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.grade-btn:hover{border-color:var(--gold);color:var(--text)}
.grade-btn.active{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold2)}

.payment-card{background:rgba(201,168,76,0.05);border:1px dashed var(--border2);border-radius:12px;padding:24px;text-align:center;margin-bottom:20px}
.payment-card h3{font-size:15px;color:var(--gold2);margin-bottom:8px}
.payment-card p{font-size:12px;color:var(--muted2);line-height:1.7}
.payment-badge{display:inline-block;background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:var(--green);font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;margin-top:10px;letter-spacing:1px}

.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),#B8942F);border:none;border-radius:8px;color:#000;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,0.3)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

.result{margin-top:20px;padding:20px;border-radius:12px;display:none}
.result.success{display:block;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3)}
.result.error{display:block;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3)}
.result h3{font-size:16px;margin-bottom:8px}
.result p{font-size:13px;color:var(--muted2);line-height:1.7;margin-bottom:4px}
.result .info-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin:12px 0;font-family:monospace;font-size:13px;color:var(--gold2)}
.result .start-btn{display:inline-block;margin-top:12px;padding:12px 28px;background:linear-gradient(135deg,#1A3A70,#2A5298);border:1px solid rgba(201,168,76,0.3);border-radius:8px;color:var(--gold2);font-size:14px;font-weight:600;text-decoration:none;transition:all .2s}
.result .start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(42,82,152,0.4)}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,0.2);border-top:2px solid #000;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:500px){.grade-grid{grid-template-columns:repeat(2,1fr)}.hero h1{font-size:28px}.topbar{padding:0 16px}}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="logo">
    <div class="logo-robo"><img src="assets/images/robo.png" alt="Robo"></div>
    CEC English Camp
    <span class="logo-badge">REGISTER</span>
  </a>
  <div class="nav-links">
    <a href="camp-b/index.html" class="nav-link">Camp B</a>
    <a href="index.html" class="nav-link">Home</a>
  </div>
</div>

<div class="main">
  <div class="hero">
    <div class="hero-rule"></div>
    <h1>수강 <em>등록</em></h1>
    <p>CEC English Camp에 오신 것을 환영합니다.<br>아래 정보를 입력하면 바로 수업을 시작할 수 있어요.</p>
  </div>

  <form id="regForm" onsubmit="return handleSubmit(event)">

    <!-- 학생 정보 -->
    <div class="card">
      <div class="card-title">📋 학생 정보</div>

      <div class="form-group">
        <label class="form-label">이름</label>
        <input class="form-input" id="f-name" type="text" placeholder="예) 김민준" required>
      </div>

      <div class="form-group">
        <label class="form-label">학년</label>
        <div class="grade-grid" id="grade-grid">
          <div class="grade-btn" data-grade="m1" onclick="pickGrade(this)">중1</div>
          <div class="grade-btn" data-grade="m2" onclick="pickGrade(this)">중2</div>
          <div class="grade-btn" data-grade="m3" onclick="pickGrade(this)">중3</div>
          <div class="grade-btn" data-grade="h1" onclick="pickGrade(this)">고1</div>
          <div class="grade-btn" data-grade="h2" onclick="pickGrade(this)">고2</div>
          <div class="grade-btn" data-grade="h3" onclick="pickGrade(this)">고3</div>
        </div>
        <input type="hidden" id="f-grade" required>
      </div>

      <div class="form-group">
        <label class="form-label">이메일</label>
        <input class="form-input" id="f-email" type="email" placeholder="예) minjun@cec.camp" required>
      </div>
    </div>

    <!-- 결제 -->
    <div class="payment-card">
      <h3>💳 결제 정보</h3>
      <p>현재 테스트 기간으로 모든 수업이 무료입니다.<br>정식 오픈 시 결제 시스템이 연동됩니다.</p>
      <div class="payment-badge">FREE ACCESS</div>
    </div>

    <!-- 제출 -->
    <button class="submit-btn" type="submit" id="submitBtn">계정 생성하기</button>
  </form>

  <div class="result" id="result"></div>
</div>

<script>
// 파이프라인 서버 프록시 경로 (ngrok CORS 우회)
const PROXY_BASE = 'https://journey-bronzy-fruitily.ngrok-free.dev';
const LOGIN_URL  = 'https://journey-bronzy-fruitily.ngrok-free.dev';

let selectedGrade = '';

function pickGrade(el) {
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedGrade = el.dataset.grade;
  document.getElementById('f-grade').value = selectedGrade;
}

async function handleSubmit(e) {
  e.preventDefault();

  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const grade = selectedGrade;

  if (!name || !email || !grade) {
    showResult('error', '입력 오류', '이름, 학년, 이메일을 모두 입력해주세요.');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>계정 생성 중...';

  try {
    // 파이프라인 서버의 /create-student 프록시 호출
    // (서버가 내부적으로 Open WebUI API를 호출하므로 CORS 문제 없음)
    const resp = await fetch(`${PROXY_BASE}/create-student`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': 'true'
      },
      body: JSON.stringify({ name, grade, email })
    });

    const data = await resp.json();

    if (data.status === 'ok') {
      showResult('success', `🎉 환영합니다, ${data.name}님!`,
        `계정이 성공적으로 생성되었습니다.`,
        { email: data.email, password: data.password, grade: data.grade });
    } else {
      const msg = data.detail || JSON.stringify(data);
      if (msg.includes('UNIQUE') || msg.includes('already') || msg.includes('exist')) {
        showResult('error', '이미 등록된 이메일', `${email}은 이미 등록되어 있어요.<br>로그인 페이지에서 접속해주세요.`);
      } else {
        showResult('error', '등록 실패', msg);
      }
    }
  } catch (err) {
    showResult('error', '연결 오류',
      `서버에 연결할 수 없습니다.<br><small style="color:var(--muted)">${err.message}</small><br>잠시 후 다시 시도해주세요.`);
  }

  btn.disabled = false;
  btn.textContent = '계정 생성하기';
}

function showResult(type, title, message, info) {
  const el = document.getElementById('result');
  el.className = `result ${type}`;

  let html = `<h3 style="color:${type === 'success' ? 'var(--green)' : 'var(--red)'}">${title}</h3><p>${message}</p>`;

  if (type === 'success' && info) {
    html += `
      <div class="info-box">
        <strong>로그인 정보 (꼭 메모하세요!)</strong><br>
        이메일: ${info.email}<br>
        비밀번호: ${info.password}<br>
        학년: ${info.grade}
      </div>
      <p style="color:var(--gold);font-size:11px;">⚠️ 비밀번호는 이 화면에서만 확인 가능합니다. 반드시 메모해주세요!</p>
      <a class="start-btn" href="${LOGIN_URL}" target="_blank">🚀 수업 시작하기 →</a>
    `;
  }

  el.innerHTML = html;
}
</script>
</body>
</html>
