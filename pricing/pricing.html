<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pricing - CEC English Camp</title>
  <style>
    body { background: #181b20; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0;}
    .pricing-cards { display: flex; justify-content: center; gap: 2rem; margin: 4rem 0; }
    .card {
      background: #23272f;
      border-radius: 16px;
      padding: 2rem 1.5rem;
      width: 300px;
      text-align: center;
      box-shadow: 0 2px 20px #0004;
    }
    .card h3 { margin: 0.5em 0; color: #49e9ff;}
    .card .price { font-size: 2rem; font-weight: bold; margin-bottom: 1em; color: #67fff5;}
    .btn {
      display: inline-block;
      background: none;
      color: #67fff5;
      border: 2px solid #67fff5;
      padding: 0.7em 1.6em;
      border-radius: 12px;
      font-size: 1.09em;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1em;
      transition: background .18s, color .18s;
    }
    .btn:hover { background: #212c3a; color: #fff;}
    /* Modal styles */
    .modal {
      display: none; position: fixed; z-index: 999;
      left: 0; top: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.53);
      justify-content: center; align-items: center;
    }
    .modal-content {
      background: #23272f;
      border-radius: 18px;
      padding: 2.1em 2em;
      width: 95%;
      max-width: 420px;
      box-shadow: 0 8px 32px #0006;
      position: relative;
      text-align: center;
    }
    .modal-content h3 { color: #49e9ff;}
    .modal-content .btn-close {
      background: none; color: #67fff5; border: 2px solid #67fff5;
      padding: 0.6em 1.3em; border-radius: 10px; margin-top: 2em;
      font-size: 1em; font-weight: 600; cursor: pointer;
      transition: background .18s, color .18s;
    }
    .modal-content .btn-close:hover { background: #273b4d; color: #fff;}
  </style>
</head>
<body>

  <h2 style="text-align:center; margin-top:2rem;">Pricing</h2>
  <div class="pricing-cards">
    <div class="card">
      <h3>Grammar Adventures</h3>
      <div class="price">Free</div>
      <p>Short novels + grammar lessons</p>
      <button class="btn" onclick="openModal(0)">Read More</button>
    </div>
    <div class="card">
      <h3>StoryQuest Workshops</h3>
      <div class="price">$25/month</div>
      <p>Story-based workshops + activities</p>
      <button class="btn" onclick="openModal(1)">Read More</button>
    </div>
    <div class="card">
      <h3>Grammar Games</h3>
      <div class="price">$50/month</div>
      <p>Interactive grammar games</p>
      <button class="btn" onclick="openModal(2)">Read More</button>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content" id="modalContent">
      <!-- JS로 내용 삽입 -->
    </div>
  </div>

  <script>
    // 각 요금제 상세내용
    const modalTexts = [
      `<h3>Grammar Adventures</h3>
      <p>
        Explore English grammar through captivating stories.<br>
        Dive into the world of English grammar with engaging short novels designed for kids.<br>
        <br><b>Highlights:</b>
        <ul style="text-align:left; margin: 0 auto 1em auto; max-width: 330px;">
          <li>Combines storytelling with grammar lessons</li>
          <li>Relatable characters and exciting plots</li>
          <li>Enhances reading and builds grammar foundation</li>
          <li>Perfect for young learners</li>
        </ul>
        <span class="price" style="color:#67fff5; font-weight:700;">Free</span>
      </p>
      <button class="btn-close" onclick="closeModal()">돌아가기</button>`,
      `<h3>StoryQuest Workshops</h3>
      <p>
        Ignite creativity and learn grammar in interactive workshops.<br>
        Each workshop is designed to inspire and foster a love for reading.<br>
        <br><b>Features:</b>
        <ul style="text-align:left; margin: 0 auto 1em auto; max-width: 330px;">
          <li>Collaborative storytelling</li>
          <li>Grammar concepts in context</li>
          <li>Peer feedback and group discussions</li>
          <li>Guided by experienced instructors</li>
        </ul>
        <span class="price" style="color:#67fff5; font-weight:700;">$25/month</span>
      </p>
      <button class="btn-close" onclick="closeModal()">돌아가기</button>`,
      `<h3>Grammar Games</h3>
      <p>
        Transform grammar lessons into fun and interactive games!<br>
        Designed for kids to make grammar exciting and engaging.<br>
        <br><b>Benefits:</b>
        <ul style="text-align:left; margin: 0 auto 1em auto; max-width: 330px;">
          <li>Identifying parts of speech and constructing sentences</li>
          <li>Games and challenges for every level</li>
          <li>Encourages critical thinking and teamwork</li>
          <li>Enhances language skills in a fun way</li>
        </ul>
        <span class="price" style="color:#67fff5; font-weight:700;">$50/month</span>
      </p>
      <button class="btn-close" onclick="closeModal()">돌아가기</button>`
    ];

    function openModal(idx) {
      document.getElementById('modalContent').innerHTML = modalTexts[idx];
      document.getElementById('modal').style.display = "flex";
    }
    function closeModal() {
      document.getElementById('modal').style.display = "none";
    }
    // 바깥 클릭시 모달 닫기
    window.onclick = function(e) {
      const modal = document.getElementById('modal');
      if (e.target === modal) closeModal();
    }
  </script>
</body>
</html>
