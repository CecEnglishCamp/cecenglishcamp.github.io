<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>영어 튜터 — CEC EnglishCamp C</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; flex-direction: column;
           height: 100vh; background: #0f172a; }

    .header {
      background: #1e3a8a;
      color: white;
      padding: 10px 20px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .voice-tip {
      background: #f59e0b;
      color: #000;
      font-size: 0.82rem;
      padding: 6px 16px;
      text-align: center;
    }

    .split {
      display: flex;
      flex: 1;
      gap: 4px;
      padding: 4px;
      overflow: hidden;
    }

    .panel-left {
      flex: 6;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #334155;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      opacity: 0;
      transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  opacity 1.2s ease;
    }

    .panel-right {
      flex: 4;
      min-width: 0;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 20px;
      transform: translateX(100%);
      opacity: 0;
      transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  opacity 1.2s ease;
    }

    .panel-left.open {
      transform: translateX(0);
      opacity: 1;
    }

    .panel-right.open {
      transform: translateX(0);
      opacity: 1;
    }

    /* 로딩 오버레이 */
    #intro-overlay {
      position: fixed;
      inset: 0;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 1s ease;
    }

    #intro-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .plane {
      display: flex;
      justify-content: center;
    }

    @keyframes takeoff {
      0%   { transform: translateX(-200px) translateY(0) rotate(0deg); opacity: 0; }
      30%  { transform: translateX(-50px) translateY(0) rotate(0deg); opacity: 1; }
      70%  { transform: translateX(100px) translateY(-60px) rotate(15deg); opacity: 1; }
      100% { transform: translateX(400px) translateY(-200px) rotate(20deg); opacity: 0; }
    }

    .intro-text {
      color: white;
      font-size: 1.2rem;
      margin-top: 24px;
      opacity: 0;
      animation: fadein 0.8s ease 0.5s forwards;
    }

    .intro-sub {
      color: #94a3b8;
      font-size: 0.85rem;
      margin-top: 8px;
      opacity: 0;
      animation: fadein 0.8s ease 1s forwards;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-label {
      background: #1e293b;
      color: #94a3b8;
      font-size: 0.75rem;
      padding: 6px 12px;
      text-align: center;
    }

    iframe {
      width: 100%;
      flex: 1;
      border: none;
    }

    .tutor-icon {
      font-size: 3rem;
    }

    .tutor-title {
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
    }

    .tutor-desc {
      color: #94a3b8;
      font-size: 0.85rem;
      text-align: center;
      line-height: 1.6;
    }

    .steps {
      background: #0f172a;
      border-radius: 10px;
      padding: 16px;
      width: 100%;
    }

    .step {
      color: #cbd5e1;
      font-size: 0.82rem;
      padding: 6px 0;
      border-bottom: 1px solid #1e293b;
      line-height: 1.5;
    }

    .step:last-child { border-bottom: none; }

    .step span {
      color: #f59e0b;
      font-weight: bold;
      margin-right: 6px;
    }

    .btn-start {
      background: #10a37f;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    .btn-start:hover { background: #0d8a6b; }

    .btn-copy {
      background: transparent;
      color: #94a3b8;
      border: 1px solid #334155;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      width: 100%;
    }

    .btn-copy:hover { color: white; border-color: #94a3b8; }

    #copy-msg {
      color: #10a37f;
      font-size: 0.78rem;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="intro-overlay">
  <div class="plane">
  <img
    src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExMzA5NmpoYjBnbWN0ajMzdDYydjN3dG9kajU3YjE4Y2IyNnhsNmh1bSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Qe5TNXF1pcMbsSdX58/giphy.gif"
    style="width:280px; height:auto; border-radius:12px;"
    alt="비행기 이륙"
  />
</div>
  <div class="intro-text">영어 여행을 떠나볼까요?</div>
  <div class="intro-sub">잠시 후 학습 화면이 열립니다...</div>
</div>

  <div class="header">
    <span>🎓 CEC EnglishCamp C — 영어 튜터 연습</span>
    <span id="ep-label">EP 01</span>
  </div>

  <div class="voice-tip">
    💡 ChatGPT 창이 열리면 → 오른쪽 아래
    <strong>🎙️ Use Voice</strong> 버튼을 클릭하고
    천천히 영어로 말해보세요!
  </div>

  <div class="split">

    <div class="panel-left">
      <div class="panel-label">📖 오늘 학습 내용</div>
      <iframe id="lesson-frame" src="./ep01.html"></iframe>
    </div>

    <div class="panel-right">
      <div class="tutor-icon">💬</div>
      <div class="tutor-title">영어 튜터와 대화하기</div>
      <div class="tutor-desc">
        오늘 배운 표현으로<br>바로 영어 회화 연습해봐요!
      </div>

      <div class="steps">
        <div class="step"><span>1</span>아래 버튼으로 학습 내용 복사</div>
        <div class="step"><span>2</span>ChatGPT 창이 열리면 Ctrl+V 붙여넣기</div>
        <div class="step"><span>3</span>오른쪽 아래 <strong style="color:#f59e0b;">Use Voice</strong> 버튼 클릭</div>
        <div class="step"><span>4</span>천천히 영어로 말해보세요!</div>
      </div>

      <button class="btn-copy" onclick="copyLesson()">
        📋 학습 내용 복사하기
      </button>
      <div id="copy-msg">✅ 복사됐어요! 이제 ChatGPT에 붙여넣으세요</div>

      <button class="btn-start" onclick="openTutor()">
        💬 영어 튜터 시작하기
      </button>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ep = params.get('ep') || '01';
    const epNum = ep.padStart(2, '0');

    document.getElementById('ep-label').textContent = 'EP ' + epNum;
    document.getElementById('lesson-frame').src = './ep' + epNum + '.html';

    const lessonData = {
      '01': `안녕하세요! 저는 오늘 CEC Camp C Episode 01 - 공항에 도착하기를 공부했어요.
오늘 배운 핵심 표현: "Excuse me. Can you help me?"
상황: 공항 도착, 수하물 찾기, 세관
지금 이 표현으로 공항 상황 롤플레이 연습을 도와주세요.
천천히, 쉬운 영어로 부탁드려요!`,

      '02': `안녕하세요! 저는 오늘 CEC Camp C Episode 02 - 딸의 아파트에서를 공부했어요.
오늘 배운 핵심 표현: "Sorry, the house is a little messy."
상황: 딸의 아파트 방문, 집 상태 표현, 위로하기
지금 이 표현으로 아파트 방문 상황 롤플레이 연습을 도와주세요.
천천히, 쉬운 영어로 부탁드려요!`,

      '03': `안녕하세요! 저는 오늘 CEC Camp C Episode 03 - 레스토랑 주문을 공부했어요.
오늘 배운 핵심 표현: "Can I see the menu, please?"
상황: 레스토랑, 메뉴 보기, 음식 주문, 직원과 대화
지금 이 표현으로 레스토랑 상황 롤플레이 연습을 도와주세요.
천천히, 쉬운 영어로 부탁드려요!`,

      '04': `안녕하세요! 저는 오늘 CEC Camp C Episode 04 - 쇼핑을 공부했어요.
오늘 배운 핵심 표현: "How much is this?"
상황: 쇼핑, 가격 묻기, 직원과 대화
지금 이 표현으로 쇼핑 상황 롤플레이 연습을 도와주세요.
천천히, 쉬운 영어로 부탁드려요!`,

      '05': `안녕하세요! 저는 오늘 CEC Camp C Episode 05 - 딸과의 첫 외출을 공부했어요.
오늘 배운 핵심 표현: "Paper or plastic?" / "To go!"
상황: 마트 계산대, 카페 주문
지금 이 표현으로 마트/카페 상황 롤플레이 연습을 도와주세요.
천천히, 쉬운 영어로 부탁드려요!`,

      '06': `안녕하세요! 저는 오늘 CEC Camp C Episode 06 - 집에서의 첫 전화를 공부했어요.
오늘 배운 핵심 표현: "Hello, this is [name] speaking."
상황: 집에서 전화 받기, 본인 확인, 용건 파악
지금 이 표현으로 전화 받기 상황 롤플레이 연습을 도와주세요.
천천히, 쉬운 영어로 부탁드려요!`
    };

    const GPT_URL = "https://chatgpt.com/g/g-69b48918e32c81919f5a6c6c6d187df3-yeongeo-tyuteo-cec-englishcamp-c";

    function copyLesson() {
      const text = lessonData[epNum] || lessonData['01'];
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copy-msg').style.display = 'block';
      });
    }

    function openTutor() {
      copyLesson();
      setTimeout(() => {
        const popupWidth = Math.floor(screen.width * 0.4);
        const popupHeight = screen.height - 100;
        const popupLeft = window.screenX + window.outerWidth - popupWidth;
        const popupTop = 0;

        const popup = window.open(
          GPT_URL,
          'tutor',
          `width=${popupWidth},height=${popupHeight},left=${popupLeft},top=${popupTop}`
        );
        if (!popup) {
          alert('팝업이 차단됐어요!\n브라우저 주소창 오른쪽 팝업 허용 버튼을 눌러주세요.');
        }
      }, 300);
    }

    // 비행기 이륙 후 두 패널 서서히 열기
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('intro-overlay').classList.add('fade-out');
      }, 2800);

      setTimeout(() => {
        document.getElementById('intro-overlay').style.display = 'none';
        document.querySelector('.panel-left').classList.add('open');
      }, 3400);

      setTimeout(() => {
        document.querySelector('.panel-right').classList.add('open');
      }, 3800);
    });
  </script>

</body>
</html>
