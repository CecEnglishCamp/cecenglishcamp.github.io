<style>

h1{font-size:1.5rem;font-weight:900;color:#1a2b5e;margin-bottom:8px}

<body>
<div class="card">
  <div class="emoji">📞</div>
  <h1>Episode 06 — 첫 전화</h1>
  <p>준비 중입니다!<br>Coming Soon</p>
  <a href="ep05.html" class="back">← Ep 05로 돌아가기</a>
</div>

<div id="ai-tutor-widget" style="display:none; margin-top:24px;">
  <div style="background:#fff;border-radius:24px;box-shadow:0 8px 40px rgba(30,43,94,0.13);padding:24px; text-align:center;">
    <div style="font-size:1.1rem; font-weight:bold; margin-bottom:8px;">
      🎓 영어 튜터와 연습하기
    </div>
    <div style="font-size:0.85rem; color:#64748b; margin-bottom:20px;">
      오늘 배운 표현으로 바로 대화 연습해봐요!<br>
      버튼을 누르면 학습 내용이 자동 복사되고 ChatGPT가 열려요.
    </div>
    <button onclick="startTutorSession()"
      style="background:#10a37f; color:white; border:none; padding:14px 32px;
             border-radius:10px; font-size:1rem; font-weight:bold; cursor:pointer;">
      💬 영어 튜터 시작하기
    </button>
    <div style="font-size:0.75rem; color:#94a3b8; margin-top:12px;">
      ChatGPT가 열리면 Ctrl+V 로 붙여넣기 후 시작하세요
    </div>
  </div>
</div>

<script>
function startTutorSession() {
    const lessonContext = `안녕하세요! 저는 오늘 CEC Camp C Episode 06 - 집에서의 첫 전화를 공부했어요.
오늘 배운 핵심 표현: "Hello, this is [name] speaking."
상황: 집에서 전화 받기, 본인 확인, 용건 파악
지금 이 표현으로 전화 받기 상황 롤플레이 연습을 도와주세요.
천천히, 쉬운 영어로 부탁드려요!`;
    navigator.clipboard.writeText(lessonContext).then(() => {
        window.open('./tutor.html?ep=06', '_blank');
    }).catch(() => {
        window.open('./tutor.html?ep=06', '_blank');
    });
}
</script>
