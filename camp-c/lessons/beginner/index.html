<!DOCTYPE html>
<html><head><meta http-equiv="refresh" content="0; url=/camp-c/ep01.html"></head><body><style>.practice-wrap {
  max-width: 860px;
  margin: 40px auto 40px;
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.prompt-section {
  background: #fff;
  border-radius: 20px;
  border: 1px solid rgba(0,0,0,0.08);
  padding: 24px 28px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}
.prompt-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.prompt-header-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.prompt-header-text { display: flex; flex-direction: column; }
.prompt-header-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }
.prompt-header-sub { font-size: 11px; color: #888; margin-top: 1px; }
.prompt-body {
  background: #f8fffe;
  border: 1px solid #d1fae5;
  border-radius: 12px;
  padding: 16px 18px;
  font-size: 13px;
  color: #374151;
  line-height: 1.85;
  white-space: pre-line;
  margin-bottom: 16px;
  min-height: 80px;
}
.copy-prompt-btn {
  width: 100%;
  padding: 14px;
  background: #059669;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s, transform 0.15s;
}
.copy-prompt-btn:hover { background: #047857; transform: translateY(-1px); }
.copy-feedback {
  display: none;
  margin-top: 10px;
  color: #059669;
  font-size: 0.85rem;
  font-weight: 700;
  text-align: center;
}
.chatgpt-launch-wrap {
  background: #fff;
  border-radius: 20px;
  border: 1px solid rgba(0,0,0,0.08);
  padding: 24px 28px;
  text-align: center;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}
.launch-emoji { font-size: 20px; margin-bottom: 6px; }
.launch-title { font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
.launch-desc { font-size: 13px; color: #6b7280; line-height: 1.7; margin-bottom: 20px; }
.launch-desc strong { color: #2563eb; }
.chatgpt-launch-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 40px;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  color: #fff;
  border: none;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.2s, opacity 0.2s;
}
.chatgpt-launch-btn:hover { transform: translateY(-2px); opacity: 0.92; }
.launch-note { margin-top: 10px; font-size: 12px; color: #9ca3af; }</style>
<div class="practice-wrap">
  <div class="prompt-section">
    <div class="prompt-header">
      <img src="https://pub-a418b5aad0bd4c3fb41cf7159403fc12.r2.dev/robo_jump.gif"
           class="prompt-header-icon" alt="Robo">
      <div class="prompt-header-text">
        <div class="prompt-header-title">AI 튜터 빅스와 영어 연습</div>
        <div class="prompt-header-sub">오늘 배운 내용을 ChatGPT에 붙여넣으세요</div>
      </div>
    </div>
    <div class="prompt-body" id="promptBody"></div>
    <button class="copy-prompt-btn" onclick="copyPrompt()">📋 프롬프트 복사하기</button>
    <div class="copy-feedback" id="copyFeedback">✅ 복사됐어요! ChatGPT에서 Ctrl+V 하세요!</div>
  </div>
  <div class="chatgpt-launch-wrap">
    <div class="launch-emoji">🎉</div>
    <div class="launch-title">수업 완료! 이제 회화 연습!</div>
    <div class="launch-desc">
      오늘 배운 내용을 보면서 <strong>ChatGPT</strong>와 대화해보세요!<br>
      <strong>왼쪽</strong>엔 오늘 수업, <strong>오른쪽</strong>엔 ChatGPT가 열립니다.
    </div>
    <button class="chatgpt-launch-btn" onclick="launchChatGPTPractice()">🎙️ ChatGPT 회화 연습 시작</button>
    <div class="launch-note">※ 처음 한 번만 팝업 허용이 필요합니다</div>
  </div>
</div>
<script>
function getCampType(){return 'c';}
function buildSummary(){
  var words=[];
  document.querySelectorAll('.key-expression,.expression-en,.vocab-en,.v-eng,.word-en,.key-word').forEach(function(el){var t=el.textContent.trim();if(t&&t.length<40)words.push(t);});
  var storyEl=document.querySelector('.story-en,.dialogue p,.story-content p,.reading-text p,.ep-story p');
  var storyText=storyEl?storyEl.textContent.replace(/\s+/g,' ').trim().substring(0,100)+'...':'';
  return ['안녕! 나는 CEC English Camp 학생이야.','오늘 '+document.title+' 을 공부했어.','','📚 오늘 배운 내용:',words.length?'- 표현/단어: '+words.slice(0,8).join(', '):'',storyText?'- 내용: '+storyText:'','','[할 것 - 5분] 오늘 배운 표현으로 짧은 대화를 도와줘.','[할 것 - 10분] 오늘 상황과 비슷한 롤플레이를 해줘.','[할 것 - 5분] 내가 말하는 영어를 듣고 자연스럽게 대화해줘.'].filter(Boolean).join('
');
}
function copyPrompt(){var s=buildSummary();navigator.clipboard.writeText(s).then(function(){var fb=document.getElementById('copyFeedback');if(fb){fb.style.display='block';setTimeout(function(){fb.style.display='none';},3000);}});}
function launchChatGPTPractice(){var s=buildSummary();var u='https://cecenglishcamp.github.io/cec_guide.html?camp=c&url='+encodeURIComponent(window.location.href)+'&summary='+encodeURIComponent(s);window.location.href=u;}
window.addEventListener('load',function(){var el=document.getElementById('promptBody');if(el)el.textContent=buildSummary();});
</script>
</body></html>
