<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>영어 레벨 선택 - 에피소드 1</title>
  <style>
    body {
      background: #222831;
      color: #fff;
      margin: 0;
      font-family: 'Noto Sans KR', 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 2rem 1rem 0 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h2 {
      margin-bottom: 0.8rem;
      font-size: 1.7rem;
      font-weight: 600;
    }

    .level-btns {
      width: 100%;
      margin: 2.5rem 0 3.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
      align-items: stretch;
    }

    .level-btns a {
      display: block;
      background: #27a6e4;
      color: #fff;
      border-radius: 2.2rem;
      padding: 1.1rem 0;
      text-align: center;
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      text-decoration: none;
      transition: background 0.16s;
      box-shadow: 0 2px 12px rgba(30,60,100,0.07);
    }
    .level-btns a:hover {
      background: #2196c9;
    }

    img {
      width: 180px;
      height: auto;
      border-radius: 14px;
      margin-bottom: 2rem;
      margin-top: 1rem;
      box-shadow: 0 4px 20px rgba(40,50,70,0.18);
    }

    .back-btns {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 3.5rem;
      width: 100%;
    }
    .back-outline-btn {
      display: inline-block;
      padding: 1.2rem 3rem;
      border: 2px solid #57f1ff;
      border-radius: 16px;
      color: #57f1ff;
      background: #18191a;
      font-size: 1.17rem;
      font-weight: 500;
      text-decoration: none;
      text-align: center;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.11);
      cursor: pointer;
    }
    .back-outline-btn:hover,
    .back-outline-btn:focus {
      background: #232526;
      color: #1ad9fc;
      border-color: #1ad9fc;
    }

    @media (max-width: 600px) {
      .container { max-width: 96vw; padding: 1rem 0.2rem; }
      .level-btns a { font-size: 1rem; padding: 0.9rem 0; }
      .back-outline-btn { font-size: 0.99rem; padding: 1rem 1.7rem; }
      img { width: 120px; }
      .back-btns { gap: 0.7rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>
      Season 1 - Episode 1<br>
      <span style="font-size:1rem; font-weight:normal;">
        Choose Your English Level
      </span>
    </h2>
    <img src="https://cecenglishcamp.github.io/BaseCamp/assets/img/episode1.png" alt="Episode 1" />

    <div class="level-btns">
      <a href="ep1-a1.html">A1 Beginner</a>
      <a href="ep1-a2.html">A2 Elementary</a>
      <a href="ep1-b1.html">B1 Intermediate</a>
      <a href="ep1-b2.html">B2 Upper-Intermediate</a>
    </div>

    <div class="back-btns">
      <a href="../index.html" class="back-outline-btn">← 시즌1 인덱스로 돌아가기</a>
      <a href="../../../index.html" class="back-outline-btn">← 베이스캠프로 돌아가기</a>
    </div>
  </div>
</body>
</html>
