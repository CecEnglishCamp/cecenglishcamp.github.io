<!DOCTYPE html>
<html lang="ko">
<head>
<script>(function(){var h=location.hostname;if(h==='cecenglishcamp.github.io'||h==='www.cecenglishcamp.com'){location.replace('https://cecenglishcamp.com'+location.pathname+location.search+location.hash);}})();</script>
<script>
(function(){
  var SUPABASE_URL = 'https://rzlqlokqplhyntuirsmd.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_A4HJDb41-YeAMIaRnB8KeQ_ssECgA6q';
  function run() {
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    sb.auth.getSession().then(function(res) {
      var session = res && res.data && res.data.session;
      if (!session) return; // 비로그인 → lock 페이지 그대로 표시
      var email = session.user.email;
      // 관리자 → 바로 입장
      if (email === 'cecenglishcamp@gmail.com') {
        window.location.replace('/space-camp/');
        return;
      }
      // space_camp_access 또는 활성 구독자 확인
      sb.from('households')
        .select('space_camp_access,plan_type,canceled_at')
        .eq('auth_user_id', session.user.id)
        .maybeSingle()
        .then(function(r) {
          if (r && r.error) return;
          var h = r && r.data;
          var paidSub = h && !!h.plan_type && !h.canceled_at;
          var hasSpaceCamp = h && h.space_camp_access === true;
          if (paidSub || hasSpaceCamp) window.location.replace('/space-camp/');
        });
    });
  }
  if (window.supabase) {
    run();
  } else {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    s.onload = run;
    document.head.appendChild(s);
  }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Camp — CEC English Camp</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--space:#020818;--deep:#0a1628;--cyan:#00f2ff;--gold:#ffd700;--orange:#ff6b35;--white:#e8f4ff;--dim:#4a6fa5;--green:#00ff88;--red:#ff4444;}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:linear-gradient(rgba(10,22,40,.75),rgba(10,22,40,.75)),
    url('https://pub-a418b5aad0bd4c3fb41cf7159403fc12.r2.dev/images/Space_Camp_Homepage_hq.webp') center center / cover no-repeat fixed;
  color:var(--white);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.8) 0%,transparent 100%),
  radial-gradient(1px 1px at 30% 50%,rgba(255,255,255,.5) 0%,transparent 100%),
  radial-gradient(1px 1px at 55% 15%,rgba(255,255,255,.8) 0%,transparent 100%),
  radial-gradient(1px 1px at 70% 70%,rgba(255,255,255,.6) 0%,transparent 100%),
  radial-gradient(2px 2px at 15% 45%,rgba(0,242,255,.35) 0%,transparent 100%),
  radial-gradient(2px 2px at 75% 15%,rgba(0,242,255,.25) 0%,transparent 100%);
pointer-events:none;z-index:0;}

/* 헤더 */
header{position:relative;z-index:10;background:rgba(2,8,24,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,242,255,.2);padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Orbitron',monospace;font-size:14px;color:var(--cyan);letter-spacing:2px;font-weight:700;text-decoration:none;}
.back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(0,242,255,.06);border:1px solid rgba(0,242,255,.2);border-radius:4px;color:var(--cyan);font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;text-decoration:none;transition:all .2s;}
.back:hover{background:rgba(0,242,255,.12);}

/* 메인 */
main{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;padding:44px 24px;}
.lock-card{width:100%;max-width:760px;text-align:center;}

/* Robo */
.robo-wrap{margin-bottom:20px;}
.robo-wrap img{width:120px;height:auto;filter:drop-shadow(0 0 24px rgba(0,242,255,.4)) brightness(1.1);animation:float 3s ease infinite;mix-blend-mode:screen;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* 배지 + 타이틀 */
.lock-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.35);border-radius:4px;padding:6px 16px;margin-bottom:18px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--orange);letter-spacing:2px;}
.lock-title{font-family:'Orbitron',monospace;font-size:38px;font-weight:900;color:var(--white);line-height:1.2;margin-bottom:8px;text-shadow:0 2px 24px rgba(0,0,0,.5);}
.lock-title span{color:var(--cyan);}
.lock-sub{font-size:15px;color:#9fb8da;margin-bottom:34px;line-height:1.7;}

/* 두 옵션 카드 */
.options{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:720px;margin:0 auto 22px;text-align:left;}
.opt-card{background:rgba(13,31,60,.85);border:1px solid rgba(0,242,255,.18);border-radius:14px;padding:30px 26px;display:flex;flex-direction:column;}
.opt-card.new{border:2px solid var(--cyan);background:rgba(9,24,48,.9);}
.opt-icon{font-size:32px;margin-bottom:14px;}
.opt-title{font-family:'Orbitron',monospace;font-size:15px;color:var(--white);margin-bottom:8px;letter-spacing:.5px;}
.opt-desc{font-size:13px;color:var(--dim);line-height:1.65;margin-bottom:22px;flex:1;}
.login-btn{display:block;text-align:center;padding:14px;background:rgba(0,242,255,.1);border:1px solid var(--cyan);border-radius:8px;color:var(--cyan);font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:1px;text-decoration:none;transition:all .2s;}
.login-btn:hover{background:rgba(0,242,255,.2);transform:translateY(-1px);}

.price-big{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:var(--white);margin-bottom:14px;}
.price-big span{color:var(--cyan);}
.warn{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.35);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--orange);font-family:'Share Tech Mono',monospace;margin-bottom:18px;line-height:1.5;}
.features{list-style:none;margin-bottom:22px;display:flex;flex-direction:column;gap:9px;flex:1;}
.features li{display:flex;align-items:center;gap:9px;font-size:13px;color:#8ca8cc;}
.features li::before{content:'✓';color:var(--green);font-weight:700;}
.pay-btn{display:block;text-align:center;padding:15px;background:var(--cyan);color:#000;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:1px;border-radius:8px;text-decoration:none;box-shadow:0 4px 20px rgba(0,242,255,.3);transition:all .2s;}
.pay-btn:hover{background:#fff;transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,242,255,.4);}

.bottom-note{text-align:center;font-size:12px;color:#7da0c8;margin-top:8px;line-height:1.7;}

@media(max-width:640px){
  header{padding:0 20px;}
  .lock-title{font-size:30px;}
  .options{grid-template-columns:1fr;max-width:420px;}
}
</style>
</head>
<body>

<header>
  <a href="/" class="logo">CEC ENGLISH CAMP</a>
  <a href="/" class="back">← 메인으로</a>
</header>

<main>
  <div class="lock-card">

    <div class="robo-wrap">
      <img src="/assets/img/robo_space.gif" alt="Robo" onerror="this.src='/assets/images/robo.png'">
    </div>

    <div class="lock-badge">🔒 MEMBERS ONLY</div>

    <h1 class="lock-title">Space <span>Camp</span></h1>
    <p class="lock-sub">
      NASA 우주비행사 후보생 영어 훈련 프로그램<br>
      20단계 미션 · 4~6학년 · Camp A GPT 연계
    </p>

    <div class="options">

      <!-- 옵션 1: 이미 회원 -->
      <div class="opt-card member">
        <div class="opt-icon">🔑</div>
        <h3 class="opt-title">이미 회원이신가요?</h3>
        <p class="opt-desc">로그인하면 바로 Space Camp 미션에 입장합니다.</p>
        <a href="/login.html?next=/space-camp/" class="login-btn">로그인하고 입장 →</a>
      </div>

      <!-- 옵션 2: 신규 등록 -->
      <div class="opt-card new">
        <div class="price-big">🚀 Space Camp <span>$99</span></div>
        <div class="warn">⚠️ 무료체험 없음 · 즉시 결제</div>
        <ul class="features">
          <li>Space Camp 20단계</li>
          <li>전체 캠프 포함</li>
          <li>수료증 발급</li>
        </ul>
        <a href="https://buy.stripe.com/28EfZjfDKaG41w40nO4ow04" class="pay-btn" target="_blank" rel="noopener">지금 결제하고 입장하기 →</a>
      </div>

    </div>

    <p class="bottom-note" style="color:#5a7a9a;font-size:13px">결제 완료 후 바로 입장하실 수 있습니다.</p>

  </div>
</main>

</body>
</html>
