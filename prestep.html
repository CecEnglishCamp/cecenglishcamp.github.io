<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEC English Camp — Let's Go!</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #000000;
  --card:      #000000;
  --border:    rgba(0,229,255,0.14);
  --border-h:  rgba(0,229,255,0.5);
  --cyan:      #00e5ff;
  --cyan-dim:  rgba(0,229,255,0.07);
  --cyan-glow: rgba(0,229,255,0.25);
  --teal:      #00897b;
  --white:     #f0f8ff;
  --grey:      #3a6070;
  --grey2:     #0d1e2c;
  --danger:    #ff4569;
  --r:         14px;
  --rs:        10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body {
  font-family:'Noto Sans KR',sans-serif;
  background:#000000;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:0 16px 40px;
  color:var(--white);
  position:relative; overflow-x:hidden;
}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(0,229,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.015) 1px,transparent 1px);
  background-size:52px 52px;pointer-events:none;
}

/* ══ TOP NAV ══ */
.topnav{
  width:100%;max-width:1100px;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 0 16px;position:relative;z-index:10;
  border-bottom:1px solid var(--border);
}
.nav-brand{display:flex;align-items:center;gap:14px;text-decoration:none;}
.nav-robo-wrap{
  width:68px;height:68px;border-radius:14px;overflow:hidden;flex-shrink:0;
  border:2px solid var(--cyan);background:#000;
  box-shadow:0 0 24px rgba(0,229,255,0.45),0 0 50px rgba(0,229,255,0.15);
  animation:navGlow 2.5s ease-in-out infinite;
}
.nav-robo-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
@keyframes navGlow{
  0%,100%{box-shadow:0 0 20px rgba(0,229,255,0.4),0 0 40px rgba(0,229,255,0.12);}
  50%{box-shadow:0 0 38px rgba(0,229,255,0.7),0 0 70px rgba(0,229,255,0.25);}
}
.nav-text{display:flex;flex-direction:column;gap:4px;}
.nav-title{font-family:'Orbitron',monospace;font-size:17px;font-weight:900;color:var(--white);letter-spacing:1.5px;line-height:1;}
.nav-title span{color:var(--cyan);}
.nav-sub{font-family:'Orbitron',monospace;font-size:9px;color:var(--grey);letter-spacing:2px;}
.nav-badge{
  font-family:'Orbitron',monospace;font-size:11px;color:var(--cyan);letter-spacing:2px;
  background:var(--cyan-dim);border:1px solid var(--border);
  padding:7px 18px;border-radius:99px;
  box-shadow:0 0 12px rgba(0,229,255,0.18);
}

/* ══ WRAPPER ══ */
.wrapper{position:relative;z-index:1;width:100%;max-width:520px;padding-top:28px;}

/* MISSION HEADER */
.mission-header{text-align:center;margin-bottom:22px;animation:fadeDown 0.5s ease both;}
.mission-sup{font-family:'Orbitron',monospace;font-size:10px;color:var(--cyan);letter-spacing:3px;margin-bottom:8px;opacity:0.75;}
.mission-title{font-family:'Black Han Sans',sans-serif;font-size:30px;color:var(--white);margin-bottom:5px;}
.mission-title em{color:var(--cyan);font-style:normal;text-shadow:0 0 20px var(--cyan-glow);}
.mission-sub{font-size:13px;color:var(--grey);}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

/* PROGRESS */
.prog-wrap{margin-bottom:20px;animation:fadeDown 0.5s 0.05s ease both;}
.prog-labels{display:flex;justify-content:space-between;margin-bottom:7px;}
.prog-label{font-family:'Orbitron',monospace;font-size:9px;color:var(--grey);letter-spacing:1.5px;}
.prog-label.active{color:var(--cyan);}
.prog-track{height:3px;background:rgba(255,255,255,0.06);border-radius:99px;position:relative;}
.prog-fill{
  height:100%;background:linear-gradient(90deg,var(--teal),var(--cyan));
  border-radius:99px;transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 0 10px var(--cyan),0 0 20px rgba(0,229,255,0.2);position:relative;
}
.prog-fill::after{
  content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);
  width:11px;height:11px;background:var(--cyan);border-radius:50%;
  box-shadow:0 0 10px var(--cyan),0 0 20px var(--cyan);
}
.prog-steps{display:flex;justify-content:space-between;margin-top:8px;}
.prog-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--grey);transition:all 0.3s;}
.prog-dot.done{background:var(--teal);border-color:var(--teal);}
.prog-dot.cur{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 8px var(--cyan);}

/* CARD — 완전 검정 */
.card{
  background:#000000;border:1px solid var(--border);
  border-radius:var(--r);padding:28px 26px;
  position:relative;overflow:hidden;
  animation:slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 8px 60px rgba(0,0,0,0.95);
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--cyan) 30%,var(--teal) 70%,transparent 100%);opacity:0.45;}
.card::after{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--cyan),var(--teal));opacity:0.55;}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* ROBO BOX */
.robo-box{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;margin-bottom:22px;
  background:rgba(0,137,123,0.07);
  border:1px solid rgba(0,137,123,0.22);
  border-radius:var(--rs);
}
.robo-av{
  width:54px;height:54px;border-radius:12px;overflow:hidden;flex-shrink:0;
  border:2px solid var(--teal);background:#000;
  box-shadow:0 0 20px rgba(0,137,123,0.4),0 0 6px var(--teal);
  animation:breathe 3s ease-in-out infinite;
}
.robo-av video{width:100%;height:100%;object-fit:cover;display:block;}
@keyframes breathe{
  0%,100%{box-shadow:0 0 14px rgba(0,137,123,0.3),0 0 4px var(--teal);}
  50%{box-shadow:0 0 28px rgba(0,137,123,0.6),0 0 10px var(--teal);}
}
.robo-name{font-family:'Orbitron',monospace;font-size:9px;color:var(--teal);letter-spacing:2px;margin-bottom:5px;}
.robo-msg{font-size:14px;font-weight:700;color:var(--white);line-height:1.55;opacity:0.92;}
.cursor{color:var(--cyan);animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* INPUT */
.igrp{margin-bottom:11px;}
.lbl{display:block;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;color:var(--cyan);letter-spacing:2px;margin-bottom:6px;}
.ifield{
  width:100%;padding:13px 16px;
  font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;color:var(--white);
  background:#000000;border:1.5px solid rgba(0,229,255,0.15);
  border-radius:var(--rs);outline:none;transition:all 0.2s;
}
.ifield:focus{border-color:var(--cyan);background:#020c14;box-shadow:0 0 0 3px rgba(0,229,255,0.08);}
.ifield::placeholder{color:var(--grey);font-weight:400;}

/* GRADE GRID */
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.gcard{
  background:#000000;border:1.5px solid rgba(0,229,255,0.1);
  border-radius:var(--rs);padding:18px 10px;
  text-align:center;cursor:pointer;transition:all 0.22s;position:relative;overflow:hidden;
}
.gcard:hover{border-color:var(--border-h);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.7);}
.gcard.sel{border-color:var(--cyan);background:#030d16;box-shadow:0 0 0 1px var(--cyan),0 0 24px rgba(0,229,255,0.1);}
.gcard .ge{font-size:30px;display:block;margin-bottom:8px;}
.gcard .gn{font-family:'Black Han Sans',sans-serif;font-size:17px;color:var(--white);}
.gcard.sel .gn{color:var(--cyan);text-shadow:0 0 10px rgba(0,229,255,0.4);}
.gcard .gs{font-size:10px;color:var(--grey);margin-top:3px;}
.chk{position:absolute;top:7px;right:7px;width:18px;height:18px;background:var(--cyan);border-radius:50%;font-size:10px;display:none;align-items:center;justify-content:center;color:#000;font-weight:900;}
.gcard.sel .chk{display:flex;}

/* ENERGY */
.erow{display:flex;gap:7px;margin-bottom:4px;}
.ebtn{
  flex:1;height:66px;border-radius:var(--rs);
  border:1.5px solid rgba(0,229,255,0.1);background:#000000;
  color:var(--white);font-size:22px;cursor:pointer;
  transition:all 0.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
}
.ebtn .en{font-family:'Orbitron',monospace;font-size:9px;color:var(--grey);letter-spacing:1px;}
.ebtn:hover{border-color:var(--border-h);transform:translateY(-2px);}
.ebtn.sel{border-color:var(--cyan);background:#030d16;box-shadow:0 0 20px rgba(0,229,255,0.12);}
.ebtn.sel .en{color:var(--cyan);}
.edesc{text-align:center;font-size:13px;font-weight:700;color:var(--grey);margin-top:12px;min-height:18px;}
.edesc.on{color:var(--cyan);text-shadow:0 0 10px rgba(0,229,255,0.35);}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;}
.chip{
  padding:8px 14px;border-radius:99px;
  border:1.5px solid rgba(0,229,255,0.1);background:#000000;
  font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;
  color:var(--white);cursor:pointer;transition:all 0.2s;user-select:none;
}
.chip:hover{border-color:var(--border-h);}
.chip.sel{border-color:var(--cyan);background:#030d16;color:var(--cyan);box-shadow:0 0 12px rgba(0,229,255,0.1);}

/* GOALS */
.goalg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.goalc{
  background:#000000;border:1.5px solid rgba(0,229,255,0.1);
  border-radius:var(--rs);padding:18px 10px;text-align:center;cursor:pointer;transition:all 0.22s;
}
.goalc:hover{border-color:var(--border-h);transform:translateY(-2px);}
.goalc.sel{border-color:var(--cyan);background:#030d16;box-shadow:0 0 20px rgba(0,229,255,0.1);}
.goalc .ge{font-size:28px;display:block;margin-bottom:8px;}
.goalc .gt{font-family:'Black Han Sans',sans-serif;font-size:14px;color:var(--white);}
.goalc.sel .gt{color:var(--cyan);}
.goalc .gs{font-size:10px;color:var(--grey);margin-top:3px;}

/* SUMMARY */
.sumg{display:grid;gap:8px;}
.sumr{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;background:#000000;
  border:1px solid rgba(0,229,255,0.1);border-radius:var(--rs);
  position:relative;overflow:hidden;
}
.sumr::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--cyan),var(--teal));}
.sico{font-size:16px;width:22px;text-align:center;}
.skey{font-family:'Orbitron',monospace;font-size:9px;color:var(--grey);letter-spacing:1px;width:52px;flex-shrink:0;}
.sval{font-size:14px;font-weight:900;color:var(--white);}

/* BUTTON */
.btn{
  width:100%;padding:15px;margin-top:20px;
  border-radius:var(--rs);border:1.5px solid var(--cyan);background:transparent;
  color:var(--cyan);font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:2px;
  cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;
  box-shadow:0 0 14px rgba(0,229,255,0.1);
}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--teal),var(--cyan));transform:translateX(-101%);transition:transform 0.3s ease;z-index:0;}
.btn:hover::before{transform:translateX(0);}
.btn:hover{color:#000;box-shadow:0 0 30px rgba(0,229,255,0.4);}
.btn span{position:relative;z-index:1;}
.btn.launch{
  background:linear-gradient(90deg,var(--teal),var(--cyan));
  color:#000;font-size:13px;border:none;
  box-shadow:0 0 30px rgba(0,229,255,0.3);
  animation:pulseBtn 2s ease-in-out infinite;
}
.btn.launch:hover{box-shadow:0 0 50px rgba(0,229,255,0.6);transform:translateY(-1px);}
@keyframes pulseBtn{0%,100%{box-shadow:0 0 25px rgba(0,229,255,0.28);}50%{box-shadow:0 0 45px rgba(0,229,255,0.5);}}

/* BACK + ERR */
.back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--grey);font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-bottom:16px;padding:4px 0;transition:color 0.2s;}
.back:hover{color:var(--cyan);}
.err{font-size:12px;color:#ff4569;font-weight:700;margin-top:8px;text-align:center;min-height:16px;}

/* LAUNCH OVERLAY */
.overlay{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at center,#030d16 0%,#000000 65%);
  z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  opacity:0;pointer-events:none;transition:opacity 0.5s;
}
.overlay.on{opacity:1;pointer-events:all;}
.ov-robo{width:96px;height:96px;border-radius:18px;overflow:hidden;background:#000;border:2px solid var(--cyan);box-shadow:0 0 50px rgba(0,229,255,0.5),0 0 100px rgba(0,229,255,0.2);animation:ovPulse 1s ease-in-out infinite;}
.ov-robo video{width:100%;height:100%;object-fit:cover;}
@keyframes ovPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.ov-title{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--white);}
.ov-title em{color:var(--cyan);font-style:normal;}
.ov-txt{font-family:'Orbitron',monospace;font-size:11px;color:var(--cyan);letter-spacing:3px;animation:blink 0.8s step-end infinite;}
.ov-bar{width:260px;height:3px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}
.ov-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--cyan));box-shadow:0 0 10px var(--cyan);width:0;animation:lf 2s ease forwards 0.4s;}
@keyframes lf{to{width:100%;}}
.ov-pct{text-align:center;margin-top:8px;font-family:'Orbitron',monospace;font-size:10px;color:var(--grey);letter-spacing:1px;}

/* PARTICLE */
.pt{position:fixed;width:4px;height:4px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:999;animation:pf var(--dur) ease-out forwards;}
@keyframes pf{0%{opacity:1;transform:translate(0,0)scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty))scale(0);}}

@media(max-width:480px){
  .card{padding:20px 14px;}
  .ebtn{height:58px;font-size:18px;}
  .mission-title{font-size:25px;}
  .nav-robo-wrap{width:54px;height:54px;}
  .nav-title{font-size:14px;}
}
</style>
</head>

<canvas id="stars"></canvas>

<!-- LAUNCH OVERLAY -->

<script>
/* STARS */
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  let W,H,stars=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  function init(){
    resize();stars=[];
    for(let i=0;i<170;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,a:Math.random(),da:(Math.random()-0.5)*0.005,speed:Math.random()*0.07+0.015});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      s.a+=s.da;if(s.a<0||s.a>1)s.da*=-1;
      s.y+=s.speed;if(s.y>H){s.y=0;s.x=Math.random()*W;}
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,229,255,${s.a*0.5})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',init);init();draw();
})();

/* DATA */
const NGROK='https://journey-bronzy-fruitily.ngrok-free.dev';
const st={step:1,ln:'',fn:'',grade:null,energy:null,interests:[],goal:null};
const GRADES=[
  {g:3,e:'🐰',n:'3학년',s:'The Velveteen Rabbit'},
  {g:4,e:'📖',n:'4학년',s:'A Christmas Carol'},
  {g:5,e:'⚡',n:'5학년',s:'Harry Potter'},
  {g:6,e:'🔱',n:'6학년',s:'Percy Jackson'},
];
const ENRG=[
  {v:1,e:'😴',k:'완전 피곤',x:'Very Tired'},
  {v:2,e:'😌',k:'좀 졸려',x:'A bit sleepy'},
  {v:3,e:'🙂',k:'보통이야',x:'Normal'},
  {v:4,e:'😄',k:'기분 좋아',x:'Feeling good'},
  {v:5,e:'🤩',k:'완전 신나!',x:'Super hyped!'},
];
const INTS=['⚽ 스포츠','🎮 게임','🎵 음악','📚 독서','🎨 그림','🍔 음식','🐾 동물','✈️ 여행','🎬 영화','💻 코딩','🧪 과학','🎭 연기'];
const GOALS=[
  {id:'reading',e:'📖',k:'읽기 연습',x:'Reading'},
  {id:'speaking',e:'🗣️',k:'말하기 연습',x:'Speaking'},
  {id:'homework',e:'📝',k:'숙제 도움',x:'Homework'},
  {id:'exam',e:'🏆',k:'시험 준비',x:'Exam Prep'},
];
const MSGS=[
  '안녕! 나는 Robo야. 이름을 알려줘! 😊',
  '좋아! 몇 학년인지 골라봐.',
  '오늘 컨디션은 어때? 솔직하게!',
  '어떤 게 제일 재미있어? 여러 개도 OK!',
  '오늘 집중할 목표를 하나 골라봐!',
  '완벽해! 수업 바로 시작해보자 🚀',
];
const HEADERS=[
  ['안녕, ','이름이 뭐야?','What\'s your name?'],
  ['학년을 ','선택해줘','What grade are you in?'],
  ['오늘 ','에너지는?','How\'s your energy today?'],
  ['관심사가 ','뭐야?','What are you into? (최대 4개)'],
  ['오늘의 ','목표는?','What\'s your goal today?'],
  ['준비 ','완료!','All systems go!'],
];
const PLABELS=['이름','학년','에너지','관심사','목표','완료!'];

function render(){
  const card=document.getElementById('card');
  card.style.animation='none';void card.offsetHeight;
  card.style.animation='slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1)';
  document.getElementById('sb').textContent=`STEP 0${st.step} / 06`;
  document.getElementById('pf').style.width=`${(st.step/6)*100}%`;
  document.getElementById('backBtn').style.display=st.step>1?'flex':'none';
  const [a,b,sub]=HEADERS[st.step-1];
  document.getElementById('mttl').innerHTML=a+`<em>${b}</em>`;
  document.getElementById('msub').textContent=sub;
  document.getElementById('pdots').innerHTML=PLABELS.map((_,i)=>`<div class="prog-dot ${i<st.step-1?'done':i===st.step-1?'cur':''}"></div>`).join('');
  document.getElementById('pleft').textContent=PLABELS[st.step-1];
  document.getElementById('pright').textContent=st.step<6?PLABELS[st.step]:'';
  const steps=[null,s1,s2,s3,s4,s5,s6];
  card.innerHTML=roboBox(MSGS[st.step-1])+steps[st.step]();
  bindK();
}

function roboBox(msg){
  return`<div class="robo-box">
    <div class="robo-av"><video src="robo_jump.mp4" autoplay loop muted playsinline></video></div>
    <div><div class="robo-name">ROBO · AI TUTOR</div><div class="robo-msg">${msg}<span class="cursor">▌</span></div></div>
  </div>`;
}

function s1(){return`
  <div class="igrp"><label class="lbl">성 · LAST NAME</label><input class="ifield" id="iL" placeholder="김" value="${st.ln}" maxlength="5"></div>
  <div class="igrp"><label class="lbl">이름 · FIRST NAME</label><input class="ifield" id="iF" placeholder="민준" value="${st.fn}" maxlength="10"></div>
  <div class="err" id="er"></div>
  <button class="btn" onclick="A1()"><span>NEXT →</span></button>`;}

function A1(){
  const l=document.getElementById('iL').value.trim(),f=document.getElementById('iF').value.trim();
  if(!l||!f){document.getElementById('er').textContent='이름을 입력해 주세요!';return;}
  st.ln=l;st.fn=f;st.step=2;render();
}

function s2(){return`
  <div class="ggrid">
    ${GRADES.map(({g,e,n,s})=>`<div class="gcard ${st.grade===g?'sel':''}" onclick="pG(${g},event)"><div class="chk">✓</div><span class="ge">${e}</span><div class="gn">${n}</div><div class="gs">${s}</div></div>`).join('')}
  </div>
  <div class="err" id="er"></div>
  <button class="btn" onclick="A2()"><span>NEXT →</span></button>`;}

function pG(g,ev){st.grade=g;document.querySelectorAll('.gcard').forEach((c,i)=>c.classList.toggle('sel',GRADES[i].g===g));spk(ev);}
function A2(){if(!st.grade){document.getElementById('er').textContent='학년을 선택해 주세요!';return;}st.step=3;render();}

function s3(){return`
  <div class="erow">${ENRG.map(({v,e})=>`<button class="ebtn ${st.energy===v?'sel':''}" onclick="pE(${v},event)">${e}<span class="en">${v}</span></button>`).join('')}</div>
  <div class="edesc ${st.energy?'on':''}" id="ed">${st.energy?ENRG[st.energy-1].k+' / '+ENRG[st.energy-1].x:'눌러봐!'}</div>
  <div class="err" id="er"></div>
  <button class="btn" onclick="A3()"><span>NEXT →</span></button>`;}

function pE(v,ev){
  st.energy=v;
  document.querySelectorAll('.ebtn').forEach((b,i)=>b.classList.toggle('sel',i+1===v));
  const d=document.getElementById('ed');d.textContent=ENRG[v-1].k+' / '+ENRG[v-1].x;d.className='edesc on';
  spk(ev);
}
function A3(){if(!st.energy){document.getElementById('er').textContent='에너지를 선택해 주세요!';return;}st.step=4;render();}

function s4(){return`
  <div class="chips">${INTS.map(o=>`<div class="chip ${st.interests.includes(o)?'sel':''}" onclick="tC('${o}',event)">${o}</div>`).join('')}</div>
  <div class="err" id="er"></div>
  <button class="btn" onclick="A4()"><span>NEXT →</span></button>`;}

function tC(o,ev){
  const i=st.interests.indexOf(o);
  if(i>-1)st.interests.splice(i,1);
  else if(st.interests.length<4){st.interests.push(o);spk(ev);}
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('sel',st.interests.includes(c.textContent)));
}
function A4(){if(!st.interests.length){document.getElementById('er').textContent='최소 1개 선택해 주세요!';return;}st.step=5;render();}

function s5(){return`
  <div class="goalg">${GOALS.map(({id,e,k,x})=>`<div class="goalc ${st.goal===id?'sel':''}" onclick="pGoal('${id}',event)"><span class="ge">${e}</span><div class="gt">${k}</div><div class="gs">${x}</div></div>`).join('')}</div>
  <div class="err" id="er"></div>
  <button class="btn" onclick="A5()"><span>NEXT →</span></button>`;}

function pGoal(id,ev){st.goal=id;document.querySelectorAll('.goalc').forEach((c,i)=>c.classList.toggle('sel',GOALS[i].id===id));spk(ev);}
function A5(){if(!st.goal){document.getElementById('er').textContent='목표를 선택해 주세요!';return;}st.step=6;render();}

function s6(){
  const nm=st.ln+st.fn,g=GOALS.find(x=>x.id===st.goal),gr=GRADES.find(x=>x.g===st.grade);
  return`
  <div class="sumg">
    <div class="sumr"><span class="sico">👤</span><span class="skey">NAME</span><span class="sval">${nm}</span></div>
    <div class="sumr"><span class="sico">🎒</span><span class="skey">GRADE</span><span class="sval">${st.grade}학년 — ${gr.s}</span></div>
    <div class="sumr"><span class="sico">⚡</span><span class="skey">ENERGY</span><span class="sval">${st.energy}/5 — ${ENRG[st.energy-1].k}</span></div>
    <div class="sumr"><span class="sico">💫</span><span class="skey">LIKES</span><span class="sval">${st.interests.map(i=>i.split(' ')[1]).join(', ')}</span></div>
    <div class="sumr"><span class="sico">🎯</span><span class="skey">GOAL</span><span class="sval">${g.k} (${g.x})</span></div>
  </div>
  <button class="btn launch" onclick="launch()"><span>🚀 수업 시작! LAUNCH LESSON</span></button>`;}

const OV_MSGS=['CHECKING PROFILE...','LOADING CURRICULUM...','CONNECTING TO ROBO...','LAUNCHING LESSON...'];
function launch(){
  const nm=st.ln+st.fn,likes=st.interests.map(i=>i.split(' ')[1]).join(',');
  const tag=`[PRESTEP] name=${nm} grade=${st.grade} energy=${st.energy} interests=${likes} goal=${st.goal}`;
  document.getElementById('ov').classList.add('on');
  let step=0;
  const iv=setInterval(()=>{
    step++;
    document.getElementById('ovTxt').textContent=OV_MSGS[Math.min(step,OV_MSGS.length-1)];
    document.getElementById('ovPct').textContent=Math.min(step*28,100)+'%';
    if(step>=4){clearInterval(iv);setTimeout(()=>{window.location.href=`${NGROK}/?q=${encodeURIComponent(tag)}`;},600);}
  },480);
}

function back(){if(st.step>1){st.step--;render();}}
function bindK(){
  const l=document.getElementById('iL'),f=document.getElementById('iF');
  if(l)l.addEventListener('keydown',e=>{if(e.key==='Enter')f&&f.focus();});
  if(f)f.addEventListener('keydown',e=>{if(e.key==='Enter')A1();});
}
function spk(ev){
  if(!ev)return;
  const x=ev.clientX||(ev.touches?.[0]?.clientX)||window.innerWidth/2;
  const y=ev.clientY||(ev.touches?.[0]?.clientY)||window.innerHeight/2;
  const cols=['#00e5ff','#00897b','#ffffff','#ffd600'];
  for(let i=0;i<12;i++){
    const p=document.createElement('div');p.className='pt';
    const a=Math.random()*Math.PI*2,d=35+Math.random()*55;
    p.style.cssText=`left:${x}px;top:${y}px;background:${cols[i%cols.length]};--dur:${0.45+Math.random()*0.5}s;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),950);
  }
}

render();
</script>
</body>
</html>
