<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEC English Camp - Let's Get Started!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #235390;
    color: #3c3c3c;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 24px;
  }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 16px;
    background: rgba(255,255,255,0.25);
    border-radius: 8px;
    margin-bottom: 32px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #58cc02;
    border-radius: 8px;
    transition: width 0.4s ease;
  }

  /* Card */
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 32px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    text-align: center;
    min-height: 380px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card.hidden { display: none; }

  .card h2 {
    font-size: 22px;
    color: #235390;
    margin-bottom: 8px;
  }
  .card .subtitle {
    font-size: 14px;
    color: #777;
    margin-bottom: 24px;
  }
  .card .emoji-big {
    font-size: 56px;
    margin-bottom: 16px;
  }

  /* Input */
  .input-group { margin-bottom: 16px; text-align: left; }
  .input-group label {
    display: block;
    font-size: 13px;
    color: #888;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .input-group input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: #58cc02; }

  /* Option buttons (Duolingo style) */
  .options { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    background: #fff;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.15s;
    text-align: left;
  }
  .option-btn:hover { border-color: #58cc02; background: #f7fff0; }
  .option-btn.selected {
    border-color: #58cc02;
    background: #d7ffb8;
    font-weight: 600;
  }
  .option-btn .opt-emoji { font-size: 24px; flex-shrink: 0; }

  /* Chip-style multi-select */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0; }
  .chip {
    padding: 10px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    user-select: none;
  }
  .chip:hover { border-color: #58cc02; }
  .chip.selected { border-color: #58cc02; background: #d7ffb8; font-weight: 600; }

  /* Energy slider */
  .energy-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 20px 0;
  }
  .energy-btn {
    width: 56px; height: 56px;
    border: 2px solid #e0e0e0;
    border-radius: 14px;
    background: #fff;
    font-size: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .energy-btn:hover { border-color: #58cc02; transform: scale(1.08); }
  .energy-btn.selected { border-color: #58cc02; background: #d7ffb8; transform: scale(1.1); }

  /* Goal */
  .goal-options { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }

  /* Buttons */
  .btn-row { margin-top: 24px; display: flex; gap: 12px; justify-content: center; }
  .btn {
    padding: 14px 32px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-next {
    background: #58cc02;
    color: #fff;
    box-shadow: 0 4px 0 #46a302;
  }
  .btn-next:hover { background: #46a302; }
  .btn-next:active { box-shadow: none; transform: translateY(4px); }
  .btn-next:disabled { background: #e0e0e0; box-shadow: 0 4px 0 #c0c0c0; cursor: not-allowed; }
  .btn-back {
    background: #fff;
    color: #888;
    border: 2px solid #e0e0e0;
  }
  .btn-back:hover { border-color: #aaa; }

  .btn-start {
    background: #ff9600;
    color: #fff;
    font-size: 18px;
    padding: 16px 40px;
    box-shadow: 0 4px 0 #cd7b00;
    width: 100%;
  }
  .btn-start:hover { background: #e88600; }
  .btn-start:active { box-shadow: none; transform: translateY(4px); }

  /* Summary */
  .summary-list {
    text-align: left;
    margin: 16px 0;
    list-style: none;
  }
  .summary-list li {
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 15px;
    display: flex;
    justify-content: space-between;
  }
  .summary-list li span:first-child { color: #888; }
  .summary-list li span:last-child { font-weight: 600; color: #235390; }
</style>
</head>
<body>
<div class="container">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 20%"></div>
  </div>

  <!-- Step 1: Name -->
  <div class="card" id="step1">
    <div>
      <div class="emoji-big">👋</div>
      <h2>안녕! 이름이 뭐야?</h2>
      <p class="subtitle">What's your name?</p>
    </div>
    <div>
      <div class="input-group">
        <label>성 (Last Name)</label>
        <input type="text" id="lastName" placeholder="김" maxlength="10">
      </div>
      <div class="input-group">
        <label>이름 (First Name)</label>
        <input type="text" id="firstName" placeholder="민준" maxlength="20">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-next" onclick="nextStep(2)">다음 Next →</button>
    </div>
  </div>

  <!-- Step 2: Grade -->
  <div class="card hidden" id="step2">
    <div>
      <div class="emoji-big">📚</div>
      <h2>몇 학년이야?</h2>
      <p class="subtitle">What grade are you in?</p>
    </div>
    <div class="options" id="gradeOptions">
      <button class="option-btn" onclick="selectGrade(this, '3학년')">
        <span class="opt-emoji">3️⃣</span> 3학년 (Grade 3)
      </button>
      <button class="option-btn" onclick="selectGrade(this, '4학년')">
        <span class="opt-emoji">4️⃣</span> 4학년 (Grade 4)
      </button>
      <button class="option-btn" onclick="selectGrade(this, '5학년')">
        <span class="opt-emoji">5️⃣</span> 5학년 (Grade 5)
      </button>
      <button class="option-btn" onclick="selectGrade(this, '6학년')">
        <span class="opt-emoji">6️⃣</span> 6학년 (Grade 6)
      </button>
    </div>
    <div class="btn-row">
      <button class="btn btn-back" onclick="prevStep(1)">← 뒤로</button>
      <button class="btn btn-next" id="gradeNext" disabled onclick="nextStep(3)">다음 Next →</button>
    </div>
  </div>

  <!-- Step 3: Energy -->
  <div class="card hidden" id="step3">
    <div>
      <div class="emoji-big">🔋</div>
      <h2>오늘 에너지는?</h2>
      <p class="subtitle">How's your energy today?</p>
    </div>
    <div class="energy-row" id="energyRow">
      <button class="energy-btn" onclick="selectEnergy(this, 1)" title="피곤해요">😴</button>
      <button class="energy-btn" onclick="selectEnergy(this, 2)" title="좀 졸려요">😐</button>
      <button class="energy-btn" onclick="selectEnergy(this, 3)" title="보통이에요">🙂</button>
      <button class="energy-btn" onclick="selectEnergy(this, 4)" title="좋아요!">😊</button>
      <button class="energy-btn" onclick="selectEnergy(this, 5)" title="완전 충전!">🔥</button>
    </div>
    <div id="energyLabel" style="font-size: 14px; color: #888; min-height: 20px;"></div>
    <div class="btn-row">
      <button class="btn btn-back" onclick="prevStep(2)">← 뒤로</button>
      <button class="btn btn-next" id="energyNext" disabled onclick="nextStep(4)">다음 Next →</button>
    </div>
  </div>

  <!-- Step 4: Interests -->
  <div class="card hidden" id="step4">
    <div>
      <div class="emoji-big">🎮</div>
      <h2>요즘 뭐에 빠져있어?</h2>
      <p class="subtitle">Pick your interests! (여러 개 OK)</p>
    </div>
    <div class="chips" id="interestChips">
      <span class="chip" onclick="toggleChip(this, 'games')">🎮 게임</span>
      <span class="chip" onclick="toggleChip(this, 'youtube')">📺 유튜브</span>
      <span class="chip" onclick="toggleChip(this, 'sports')">⚽ 스포츠</span>
      <span class="chip" onclick="toggleChip(this, 'music')">🎵 음악</span>
      <span class="chip" onclick="toggleChip(this, 'animals')">🐶 동물</span>
      <span class="chip" onclick="toggleChip(this, 'drawing')">🎨 그림</span>
      <span class="chip" onclick="toggleChip(this, 'cooking')">🍳 요리</span>
      <span class="chip" onclick="toggleChip(this, 'reading')">📖 독서</span>
      <span class="chip" onclick="toggleChip(this, 'kpop')">🎤 K-pop</span>
      <span class="chip" onclick="toggleChip(this, 'science')">🔬 과학</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-back" onclick="prevStep(3)">← 뒤로</button>
      <button class="btn btn-next" id="interestNext" disabled onclick="nextStep(5)">다음 Next →</button>
    </div>
  </div>

  <!-- Step 5: Goal + Summary -->
  <div class="card hidden" id="step5">
    <div>
      <div class="emoji-big">🎯</div>
      <h2>오늘의 목표!</h2>
      <p class="subtitle">What do you want to do today?</p>
    </div>
    <div class="options" id="goalOptions">
      <button class="option-btn" onclick="selectGoal(this, 'reading')">
        <span class="opt-emoji">📖</span> 재미있는 영어 읽기
      </button>
      <button class="option-btn" onclick="selectGoal(this, 'speaking')">
        <span class="opt-emoji">🗣️</span> 영어로 말하기 연습
      </button>
      <button class="option-btn" onclick="selectGoal(this, 'homework')">
        <span class="opt-emoji">📝</span> 숙제 도움
      </button>
      <button class="option-btn" onclick="selectGoal(this, 'exam')">
        <span class="opt-emoji">🎯</span> 시험 준비
      </button>
    </div>
    <div class="btn-row">
      <button class="btn btn-back" onclick="prevStep(4)">← 뒤로</button>
      <button class="btn btn-next" id="goalNext" disabled onclick="nextStep(6)">다음 Next →</button>
    </div>
  </div>

  <!-- Step 6: Summary + Start -->
  <div class="card hidden" id="step6">
    <div>
      <div class="emoji-big">🚀</div>
      <h2>준비 완료!</h2>
      <p class="subtitle">Ready to start your lesson!</p>
    </div>
    <ul class="summary-list" id="summaryList"></ul>
    <div class="btn-row" style="flex-direction: column;">
      <button class="btn btn-start" onclick="startLesson()">수업 시작! Let's go! 🚀</button>
      <button class="btn btn-back" style="width: 100%; margin-top: 8px;" onclick="prevStep(5)">← 수정하기</button>
    </div>
  </div>
</div>

<script>
const state = {
  lastName: '',
  firstName: '',
  grade: '',
  energy: 0,
  interests: [],
  goal: '',
};

const TOTAL_STEPS = 6;

function updateProgress(step) {
  const pct = Math.round((step / TOTAL_STEPS) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

function showStep(n) {
  for (let i = 1; i <= TOTAL_STEPS; i++) {
    document.getElementById('step' + i).classList.toggle('hidden', i !== n);
  }
  updateProgress(n);
  if (n === 6) buildSummary();
}

function nextStep(n) {
  // Validate current step
  if (n === 2) {
    state.lastName = document.getElementById('lastName').value.trim();
    state.firstName = document.getElementById('firstName').value.trim();
    if (!state.firstName) {
      document.getElementById('firstName').focus();
      document.getElementById('firstName').style.borderColor = '#ff4b4b';
      return;
    }
  }
  showStep(n);
}

function prevStep(n) {
  showStep(n);
}

function selectGrade(btn, grade) {
  document.querySelectorAll('#gradeOptions .option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.grade = grade;
  document.getElementById('gradeNext').disabled = false;
}

const energyLabels = {
  1: '😴 오늘 좀 피곤해...',
  2: '😐 졸려요...',
  3: '🙂 보통이야!',
  4: '😊 좋아! 준비됐어!',
  5: '🔥 완전 충전! 달려보자!',
};

function selectEnergy(btn, level) {
  document.querySelectorAll('#energyRow .energy-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.energy = level;
  document.getElementById('energyLabel').textContent = energyLabels[level];
  document.getElementById('energyNext').disabled = false;
}

function toggleChip(chip, interest) {
  chip.classList.toggle('selected');
  const idx = state.interests.indexOf(interest);
  if (idx === -1) {
    state.interests.push(interest);
  } else {
    state.interests.splice(idx, 1);
  }
  document.getElementById('interestNext').disabled = state.interests.length === 0;
}

function selectGoal(btn, goal) {
  document.querySelectorAll('#goalOptions .option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.goal = goal;
  document.getElementById('goalNext').disabled = false;
}

function buildSummary() {
  const list = document.getElementById('summaryList');
  const goalNames = { reading: '영어 읽기', speaking: '말하기 연습', homework: '숙제 도움', exam: '시험 준비' };
  list.innerHTML = `
    <li><span>이름</span><span>${state.lastName}${state.firstName}</span></li>
    <li><span>학년</span><span>${state.grade}</span></li>
    <li><span>에너지</span><span>${'🔋'.repeat(state.energy)}</span></li>
    <li><span>관심사</span><span>${state.interests.join(', ')}</span></li>
    <li><span>오늘 목표</span><span>${goalNames[state.goal] || state.goal}</span></li>
  `;
}

async function startLesson() {
  const prestepMsg = `[PRESTEP] name=${state.lastName+state.firstName} grade=${state.grade} energy=${state.energy} interests=${state.interests.join(',')} goal=${state.goal}`;

  const btn = document.querySelector('.btn-start');
  btn.textContent = '연결 중... ⏳';
  btn.disabled = true;

  const url = 'https://journey-bronzy-fruitily.ngrok-free.dev/?q='
              + encodeURIComponent(prestepMsg);
  window.location.href = url;
}
</script>
</body>
</html>
