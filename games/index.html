<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games — CEC English Camp</title>
<style>
  body { font-family: sans-serif; background: #0f1420; color: #f5f0e8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .wrap { max-width: 700px; padding: 3rem 1.5rem; text-align: center; }
  h1 { font-size: 2.5rem; color: #00f2ff; margin-bottom: 1rem; }
  p { color: #9ba3c7; margin-bottom: 2rem; line-height: 1.8; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
  .card { background: rgba(30,37,71,.6); border: 1px solid rgba(0,242,255,.2); border-radius: 8px; padding: 1.5rem; text-decoration: none; display: block; transition: border-color .2s; }
  .card:hover { border-color: #00f2ff; }
  .card-icon { font-size: 2.5rem; margin-bottom: .8rem; display: block; }
  .card-title { font-size: 1.1rem; color: #e8c983; margin-bottom: .3rem; }
  .card-desc { font-size: .85rem; color: #9ba3c7; }
  .nav { margin-bottom: 2rem; }
  .nav a { color: #c9a961; text-decoration: none; font-size: .85rem; }
</style>
</head>
<body>
<div class="wrap">
  <div class="nav"><a href="/">← CEC English Camp</a></div>
  <h1>🎮 Games</h1>
  <p>배우면서 즐겁게! CEC 영어 게임 모음</p>
  <div class="grid">
    <a href="/grammar-game.html" class="card">
      <span class="card-icon">⚡</span>
      <div class="card-title">Grammar Battle</div>
      <div class="card-desc">문법 배틀 게임 — 레벨별 도전</div>
    </a>
    <a href="#" class="card" style="opacity:.5; cursor:default;">
      <span class="card-icon">🔤</span>
      <div class="card-title">Word Puzzle (준비 중)</div>
      <div class="card-desc">단어 퍼즐 게임</div>
    </a>
    <a href="#" class="card" style="opacity:.5; cursor:default;">
      <span class="card-icon">🎯</span>
      <div class="card-title">Quiz Battle (준비 중)</div>
      <div class="card-desc">퀴즈 배틀</div>
    </a>
  </div>
</div>
</body>
</html>
