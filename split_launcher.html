<html lang="ko">
<head><meta charset="UTF-8"><title>열기 중...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a1628; color: #00f2ff; font-family: sans-serif; overflow: hidden; }
  .msg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 1.2rem; gap: 12px;
  }
  .sub { color: #7a9bb5; font-size: 0.85rem; }
</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CEC English Camp | 고전문학 기반 영어 교육 플랫폼">
  <link rel="canonical" href="https://cecenglishcamp.com/split_launcher.html">
  <meta property="og:title" content="열기 중...">
  <meta property="og:description" content="CEC English Camp | 고전문학 기반 영어 교육 플랫폼">
  <meta property="og:url" content="https://cecenglishcamp.com/split_launcher.html">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://pub-a418b5aad0bd4c3fb41cf7159403fc12.r2.dev/og-default.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <!-- CEC GA4 측정 ID: G-58N1MFP27H (실제 ID로 교체 필요) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-58N1MFP27H"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-58N1MFP27H');
  </script>
</head>
<body>

<div class="msg" id="loading">
  <div>🎙️ 창을 여는 중...</div>
  <div class="sub">수업 페이지 + ChatGPT 준비 중</div>
</div>

<script>
window.onload = function() {
  var params = new URLSearchParams(window.location.search);
  var lessonUrl = params.get('url') ||
    'https://cecenglishcamp.github.io/camp-a/grade3/week01.html';
  var camp = params.get('camp') || 'a';
  var summary = params.get('summary') || '';

  var GPT = {
    a: 'https://chatgpt.com/g/g-69b4931ba6d4819194bb864aed20723b',
    b: 'https://chatgpt.com/g/g-69b497878a448191b2b2487f4f695166',
    c: 'https://chatgpt.com/g/g-69b48918e32c81919f5a6c6c6d187df3'
  };
  var gptUrl = GPT[camp] || GPT['a'];

  var sw = window.screen.width;
  var sh = window.screen.height;
  var half = Math.floor(sw / 2);

  // 클립보드 복사
  if (summary) {
    try {
      navigator.clipboard.writeText(decodeURIComponent(summary));
    } catch(e) {}
  }

  // ① launcher 자신을 오른쪽 절반으로 이동
  window.moveTo(half, 0);
  window.resizeTo(half, sh);

  // ② 원본 창(cec_guide.html이 열려있던 창)을
  //    왼쪽 절반으로 이동 + 수업 URL로 변경
  setTimeout(function() {
    if (window.opener && !window.opener.closed) {
      window.opener.moveTo(0, 0);
      window.opener.resizeTo(half, sh);
      window.opener.location.href = lessonUrl;
    }

    // ③ launcher 자신은 ChatGPT로 이동
    setTimeout(function() {
      window.location.href = gptUrl;
    }, 200);
  }, 400);
};
</script>
</body>
</html>
